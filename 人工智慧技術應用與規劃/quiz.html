function getTopics() {
  const counts = {};
  POOL.forEach(q => counts[q.topic] = (counts[q.topic] || 0) + 1);
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function getWeakTopics() {
  const counts = {};
  getRounds().forEach(r => {
    r.responses.forEach(resp => {
      if (!resp.is_correct) {
        const q = POOL.find(q => q.id === resp.q_id);
        if (q) counts[q.topic] = (counts[q.topic] || 0) + 1;
      }
    });
  });
  return Object.entries(counts).sort((a,b) => b[1] - a[1]);
}

function shuffle(arr) {
  const a = arr.slice();
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function pickQuestions(topicFilter, count) {
  let pool = POOL;
  if (topicFilter && topicFilter !== "all") {
    if (topicFilter.includes("/")) {
      pool = POOL.filter(q => q.topic === topicFilter);
    } else {
      pool = POOL.filter(q => q.topic.startsWith(topicFilter + "/") || q.topic === topicFilter);
    }
  }
  return shuffle(pool).slice(0, Math.min(count, pool.length));
}

function escapeHtml(s) {
  return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
}

// When options are shuffled, rewrite the explanation's letter references (A/B/C/D) so they match the
// displayed letter order shown on screen. Keeps the explanation consistent with the highlighted option.
function translateExplanation(md, displayOrder) {
  if (!displayOrder || displayOrder.join(",") === "A,B,C,D") return md;
  const orig = ["A","B","C","D"];
  // map[origLetter] = displayed letter (e.g., original "D" might display as "B")
  const map = {};
  orig.forEach(L => map[L] = orig[displayOrder.indexOf(L)]);

  // Pass 1: rewrite "為什麼 X 是" (the "why is X correct" header)
  let out = md.replace(/為什麼\s+([A-D])\s+是/g, (_, L) => `為什麼 ${map[L]} 是`);
  // Pass 2: rewrite bullet items "- X." or joined "- X./Y."
  out = out.replace(/^(\s*-\s+)([A-D])\.(\s*\/\s*([A-D])\.)?/gm, (_, prefix, L1, slashGrp, L2) => {
    let res = prefix + map[L1] + ".";
    if (L2) res += "/" + map[L2] + ".";
    return res;
  });

  // Pass 3: sort the consecutive bullet block by the new letter so the list reads A→D again
  const lines = out.split("\n");
  const bulletRe = /^\s*-\s+([A-D])\./;
  const result = [];
  let buffer = [];
  const flush = () => {
    if (buffer.length > 0) {
      buffer.sort((a, b) => a[0].localeCompare(b[0]));
      result.push(...buffer.map(x => x[1]));
      buffer = [];
    }
  };
  for (const line of lines) {
    const m = bulletRe.exec(line);
    if (m) buffer.push([m[1], line]);
    else { flush(); result.push(line); }
  }
  flush();
  return result.join("\n");
}

// Tiny markdown renderer for explanations: handles **bold**, `code`, bullet lists ("- "), and paragraph breaks.
// Escapes everything else as HTML to stay safe.
function renderMarkdown(md) {
  const lines = md.split("\n");
  const out = [];
  let inList = false;
  const inline = (s) => {
    s = escapeHtml(s);
    s = s.replace(/\*\*(.+?)\*\*/g, "<strong>$1</strong>");
    s = s.replace(/`([^`]+)`/g, "<code>$1</code>");
    return s;
  };
  for (const raw of lines) {
    const line = raw.trimEnd();
    if (/^\s*-\s+/.test(line)) {
      if (!inList) { out.push("<ul>"); inList = true; }
      out.push("<li>" + inline(line.replace(/^\s*-\s+/, "")) + "</li>");
    } else {
      if (inList) { out.push("</ul>"); inList = false; }
      if (line === "") out.push("");
      else out.push("<p>" + inline(line) + "</p>");
    }
  }
  if (inList) out.push("</ul>");
  return out.join("");
}

// ======== VIEWS ========
function render() {
  const app = document.getElementById("app");
  if (state.view === "home") app.innerHTML = renderHome();
  else if (state.view === "quiz") app.innerHTML = renderQuiz();
  else if (state.view === "results") app.innerHTML = renderResults();
  else if (state.view === "history") app.innerHTML = renderHistory();
}

function renderHome() {
  const topics = getTopics();
  const weakTopics = getWeakTopics();
  const rounds = getRounds();
  const totalAsked = rounds.reduce((sum, r) => sum + r.responses.length, 0);
  const totalCorrect = rounds.reduce((sum, r) => sum + r.responses.filter(x => x.is_correct).length, 0);
  const overallPct = totalAsked > 0 ? Math.round(100 * totalCorrect / totalAsked) : 0;

  // Group topics by family
  const families = {};
  topics.forEach(([t, n]) => {
    const fam = t.split("/")[0];
    if (!families[fam]) families[fam] = 0;
    families[fam] += n;
  });
  const familyOptions = Object.entries(families).sort((a,b) => b[1] - a[1])
    .map(([f, n]) => `<option value="${f}">${f} (${n} 題)</option>`).join("");
  const topicOptions = topics.map(([t, n]) =>
    `<option value="${t}">${t} (${n} 題)</option>`).join("");

  return `
    <div class="card">
      <h2>開始新一回合</h2>
      <div class="row">
        <div class="field">
          <label>主題範圍</label>
          <select id="topic-filter">
            <option value="all">全部主題 (${POOL.length} 題)</option>
            <optgroup label="主題群組 (跨子分類)">${familyOptions}</optgroup>
            <optgroup label="精細子主題">${topicOptions}</optgroup>
          </select>
        </div>
        <div class="field">
          <label>題目數量</label>
          <select id="round-size">
            <option value="5">5 題 (快速)</option>
            <option value="10" selected>10 題 (標準)</option>
            <option value="15">15 題 (進階)</option>
            <option value="20">20 題 (深度)</option>
            <option value="999">全部 (該主題所有題)</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>選項順序</label>
        <select id="shuffle-options">
          <option value="original" selected>原順序 (與 PDF 一致)</option>
          <option value="shuffle">隨機打亂 (避免靠位置記答案)</option>
        </select>
      </div>
      <button class="btn btn-primary" style="width:100%; padding:12px;" onclick="startRound()">開始作答 →</button>
      <p class="note">作答時可用 <span class="kbd">A/B/C/D</span> 選答，<span class="kbd">Enter</span> 下一題，<span class="kbd">W</span> 切換「為什麼？」相關章節。</p>
    </div>

    <div class="card">
      <h2>累計成績</h2>
      <div class="score-display">
        <span class="score-big">${totalCorrect}/${totalAsked}</span>
        <span class="score-pct">${overallPct}% · ${rounds.length} 回合</span>
      </div>
      ${weakTopics.length > 0 ? `
      <div class="summary-section">
        <h3>累計弱點主題（依錯題數）</h3>
        <div>${weakTopics.slice(0, 8).map(([t, n]) => `<span class="weak-pill">${t} · 錯 ${n}</span>`).join("")}</div>
      </div>
      ` : `<p class="empty-state" style="padding:20px 0">尚未作答 — 開始第一回合吧。</p>`}
      ${(() => {
        const cumWrongs = getCumulativeWrongs();
        if (cumWrongs.length === 0) return '';
        return `
          <div class="summary-section">
            <h3>累計答錯題目（${cumWrongs.length} 題未訂正）</h3>
            <p class="note" style="margin:-4px 0 12px;">答對後會自動從清單移除。點 💡 看解析展開該題。</p>
            ${cumWrongs.map(w => renderMissItem(w.q, w.resp, { open: false, wrongCount: w.count })).join("")}
          </div>` ;
      })()}
    </div>
  `;
}

function renderQuiz() {
  const r = state.round;
  const idx = r.responses.length;
  const total = r.questions.length;
  const q = r.questions[idx];
  const order = q.display_order || ["A","B","C","D"];
  // Displayed letter that holds the correct option (e.g., if order = ["C","A","D","B"] and correct = "D", then correctDisplay = "C")
  const correctDisplay = ["A","B","C","D"][order.indexOf(q.correct_answer)];
  const correct = r.responses.filter(x => x.is_correct).length;
  const justAnsweredCorrect = state.answered && state.selected === correctDisplay ? 1 : 0;
  const displayedCorrect = correct + justAnsweredCorrect;
  const displayedDenom = idx + (state.answered ? 1 : 0);
  const pct = Math.round((displayedDenom / total) * 100);

  const optionsHtml = order.map((origLetter, i) => {
    const displayLetter = ["A","B","C","D"][i];
    let cls = "option";
    if (state.answered) {
      if (displayLetter === correctDisplay) cls += " reveal-correct";
      if (displayLetter === state.selected) cls += " selected " + (state.selected === correctDisplay ? "correct" : "wrong");
    } else if (state.selected === displayLetter) {
      cls += " selected";
    }
    return `
      <button class="${cls}" data-letter="${displayLetter}" onclick="selectOption('${displayLetter}')" ${state.answered ? 'disabled' : ''}>
        <span class="letter">${displayLetter}</span>
        <span class="text">${escapeHtml(q.options[origLetter])}</span>
      </button>`;
  }).join("");

  const ref = TOPIC_REFS[q.topic];
  const shuffledNote = r.shuffled
    ? `<p class="shuffle-note">🔀 本回合選項已隨機打亂；解析中的 A/B/C/D 已對應到本題實際顯示順序。</p>`
    : '';
  const explanationMd = r.shuffled
    ? translateExplanation(q.explanation || '', q.display_order)
    : (q.explanation || '');
  const whyPanelHtml = state.answered && state.showWhy ? `
    <div class="why-panel">
      ${q.explanation ? `
        <h3>💡 解析</h3>
        ${shuffledNote}
        <div class="why-explanation">${renderMarkdown(explanationMd)}</div>
      ` : ''}
      <h3 style="margin-top:${q.explanation ? '20px' : '0'};">📖 延伸閱讀</h3>
      ${ref ? `
        <div class="why-row"><span class="why-label">章節</span><span>${escapeHtml(ref.chapter)} · ${escapeHtml(ref.section)}</span></div>
        <div class="why-row"><span class="why-label">頁碼</span><span>${escapeHtml(ref.local)}（PDF 約第 ${ref.pdf} 頁）</span></div>
        <div class="why-links">
          <a class="btn btn-link" href="${pdfHref(STUDY_GUIDE_PDF, ref.pdf)}" target="_blank">📄 學習指引 PDF →</a>
          <a class="btn btn-link" href="${pdfHref(q.source.file, q.source.page)}" target="_blank">📄 試題原文 (第 ${q.source.page} 頁) →</a>
        </div>
      ` : `
        <p class="muted">此主題尚未建立章節對應，請參考試題原文。</p>
        <div class="why-links">
          <a class="btn btn-link" href="${pdfHref(q.source.file, q.source.page)}" target="_blank">📄 試題原文 (第 ${q.source.page} 頁) →</a>
        </div>
      `}
      <p class="muted" style="margin-top:12px;">頁碼為估計值，可在 PDF 中前後翻一兩頁尋找。</p>
    </div>
  ` : '';

  const feedbackHtml = state.answered ? `
    <div class="feedback ${state.selected === correctDisplay ? 'correct' : 'wrong'}">
      <strong>${state.selected === correctDisplay ? '✓ 答對' : '✗ 答錯 — 正解：' + correctDisplay}</strong>
      <span class="source">出處：${escapeHtml(q.source.file)} · 第 ${q.source.page} 頁</span>
    </div>
    ${whyPanelHtml}
    <div class="next-btn-row">
      <button class="btn" onclick="toggleWhy()">${state.showWhy ? '收起' : '💡 為什麼？'}</button>
      <button class="btn btn-primary" onclick="nextQuestion()">${idx + 1 === total ? '看結果 →' : '下一題 →'}</button>
    </div>
  ` : '';

  return `
    <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
    <div class="card">
      <div class="q-meta">
        <span>第 ${idx + 1} / ${total} 題</span>
        <span class="q-topic-chip">${escapeHtml(q.topic)}</span>
      </div>
      <div class="q-text">${escapeHtml(q.question_text)}</div>
      ${q.image ? `<div class="q-image"><img src="${escapeHtml(q.image)}" alt="題目附圖"></div>` : ''}
      <div class="options">${optionsHtml}</div>
      ${feedbackHtml}
      <div class="note" style="margin-top:16px;">本回合得分：${displayedCorrect} / ${displayedDenom}${state.answered ? ' (含本題)' : ''}</div>
    </div>
  `;
}

function renderMissItem(q, resp, opts = {}) {
  const { open = false, wrongCount = 1 } = opts;
  const ref = TOPIC_REFS[q.topic];
  const userOpt = q.options[resp.user_answer];
  const correctOpt = q.options[q.correct_answer];
  const countBadge = wrongCount > 1 ? ` <span class="wrong-count-badge">錯 ${wrongCount} 次</span>` : '';
  return `
    <div class="miss-item">
      <div class="miss-q">[${escapeHtml(q.topic)}]${countBadge} ${escapeHtml(q.question_text.slice(0, 80))}${q.question_text.length > 80 ? '…' : ''}</div>
      <div class="miss-detail">你選 <strong>${resp.user_answer}</strong> · 正解 <strong>${q.correct_answer}</strong> · ${escapeHtml(q.source.file)} 第 ${q.source.page} 頁</div>
      <details class="miss-recap"${open ? ' open' : ''}>
        <summary>💡 看解析</summary>
        <div class="miss-recap-body">
          <div class="miss-full-q">${escapeHtml(q.question_text)}</div>
          ${q.image ? `<div class="q-image"><img src="${escapeHtml(q.image)}" alt="題目附圖"></div>` : ''}
          <div class="miss-choice miss-choice-wrong"><span class="miss-choice-label">你選 ${resp.user_answer}</span><span>${userOpt ? escapeHtml(userOpt) : '(未作答)'}</span></div>
          <div class="miss-choice miss-choice-correct"><span class="miss-choice-label">正解 ${q.correct_answer}</span><span>${escapeHtml(correctOpt)}</span></div>
          ${q.explanation ? `<div class="why-explanation">${renderMarkdown(q.explanation)}</div>` : '<div class="miss-no-explain">（此題無解析）</div>'}
          ${ref ? `
            <div class="why-links">
              <a class="btn btn-link" href="${pdfHref(STUDY_GUIDE_PDF, ref.pdf)}" target="_blank">📄 學習指引 第 ${ref.pdf} 頁</a>
              <a class="btn btn-link" href="${pdfHref(q.source.file, q.source.page)}" target="_blank">📄 試題原文 第 ${q.source.page} 頁</a>
            </div>` : ''}
        </div>
      </details>
    </div>`;
}

function getCumulativeWrongs() {
  const rounds = getRounds();
  const map = new Map();
  rounds.forEach(r => {
    r.responses.forEach(resp => {
      if (resp.is_correct) {
        if (map.has(resp.q_id)) map.get(resp.q_id).resolved = true;
      } else {
        const cur = map.get(resp.q_id) || { count: 0, latest: null, resolved: false };
        cur.count++;
        cur.latest = resp;
        cur.resolved = false;
        map.set(resp.q_id, cur);
      }
    });
  });
  return Array.from(map.entries())
    .filter(([, info]) => !info.resolved && POOL.find(p => p.id === info.latest.q_id))
    .map(([qid, info]) => ({ q: POOL.find(p => p.id === qid), resp: info.latest, count: info.count }))
    .sort((a, b) => b.count - a.count);
}

function renderResults() {
  const r = state.round;
  const correct = r.responses.filter(x => x.is_correct).length;
  const total = r.responses.length;
  const pct = Math.round(100 * correct / total);
  const wrongs = r.responses.filter(x => !x.is_correct);

  const wrongHtml = wrongs.map(resp => renderMissItem(POOL.find(x => x.id === resp.q_id), resp, { open: true })).join("");

  return `
    <div class="card">
      <h2>本回合結果</h2>
      <div class="score-display">
        <span class="score-big">${correct}/${total}</span>
        <span class="score-pct">${pct}%</span>
      </div>
      <div class="summary-section">
        <h3>主題範圍</h3>
        <p style="margin:0;">${escapeHtml(r.scope)}</p>
      </div>
      ${wrongs.length > 0 ? `
      <div class="summary-section">
        <h3>答錯題目 (${wrongs.length})</h3>
        ${wrongHtml}
      </div>` : `
      <div class="summary-section">
        <h3>🎉 全對！</h3>
        <p>本回合所有題目都答對了。</p>
      </div>`}
      <div class="next-btn-row">
        <button class="btn" onclick="goHome()">回首頁</button>
        <button class="btn btn-primary" onclick="redoRound()">同樣設定再來一回 →</button>
      </div>
    </div>
  `;
}

function renderHistory() {
  const rounds = getRounds();
  if (rounds.length === 0) {
    return `<div class="card"><div class="empty-state">尚無歷史紀錄。</div></div>`;
  }
  const rows = rounds.slice().reverse().map((r, i) => {
    const correct = r.responses.filter(x => x.is_correct).length;
    const total = r.responses.length;
    const pct = Math.round(100 * correct / total);
    const date = new Date(r.started).toLocaleString("zh-TW", { month: "2-digit", day: "2-digit", hour: "2-digit", minute: "2-digit" });
    return `<tr>
      <td>${rounds.length - i}</td>
      <td>${escapeHtml(r.scope)}</td>
      <td><strong>${correct}/${total}</strong> (${pct}%)</td>
      <td>${date}</td>
    </tr>`;
  }).join("");
  return `
    <div class="card">
      <h2>歷史紀錄</h2>
      <table class="history-table">
        <thead><tr><th>#</th><th>範圍</th><th>分數</th><th>日期</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="next-btn-row">
        <button class="btn" onclick="exportData()">匯出 JSON</button>
        <button class="btn" onclick="resetData()" style="color:var(--wrong);">清除全部紀錄</button>
      </div>
    </div>
  `;
}

// ======== ACTIONS ========
function startRound() {
  const topic = document.getElementById("topic-filter").value;
  const size = parseInt(document.getElementById("round-size").value, 10);
  const shuffleOpts = document.getElementById("shuffle-options").value === "shuffle";
  // Attach a per-question display_order. ["A","B","C","D"] means show original order;
  // a shuffled permutation means display slot i shows the original letter at that index.
  const questions = pickQuestions(topic, size).map(q => ({
    ...q,
    display_order: shuffleOpts ? shuffle(["A","B","C","D"]) : ["A","B","C","D"]
  }));
  if (questions.length === 0) { alert("此主題沒有題目。"); return; }
  const topicLabel = topic === "all" ? "全部主題" : topic;
  state.round = {
    questions: questions,
    responses: [],
    scope: `${topicLabel} · ${questions.length} 題${shuffleOpts ? " · 隨機打亂" : ""}`,
    shuffled: shuffleOpts,
    started: new Date().toISOString()
  };
  state.view = "quiz";
  state.selected = null;
  state.answered = false;
  state.showWhy = false;
  render();
}

function selectOption(letter) {
  if (state.answered) return;
  state.selected = letter;
  state.answered = true;
  render();
}

function nextQuestion() {
  // Commit the answer for the current question now (deferred until "Next" so feedback renders against the right question)
  const idx = state.round.responses.length;
  const q = state.round.questions[idx];
  // Translate displayed letter (what user clicked) back to the original PDF letter (for stats consistency).
  const order = q.display_order || ["A","B","C","D"];
  const displayLetter = state.selected;
  const origLetter = order[["A","B","C","D"].indexOf(displayLetter)];
  state.round.responses.push({
    q_id: q.id,
    user_answer: origLetter,
    display_letter_chosen: displayLetter,
    display_order: order,
    is_correct: origLetter === q.correct_answer,
    ts: new Date().toISOString()
  });
  state.selected = null;
  state.answered = false;
  state.showWhy = false;
  if (state.round.responses.length >= state.round.questions.length) {
    state.round.completed = new Date().toISOString();
    appendRound(state.round);
    state.view = "results";
  }
  render();
}

function toggleWhy() {
  state.showWhy = !state.showWhy;
  render();
}

function redoRound() {
  const lastTopic = state.round && state.round.scope.split(" · ")[0];
  state.round = null;
  state.view = "home";
  render();
  // try to preserve topic+size
  if (lastTopic) {
    const sel = document.getElementById("topic-filter");
    const opt = Array.from(sel.options).find(o => o.text.startsWith(lastTopic) || o.value === lastTopic);
    if (opt) sel.value = opt.value;
  }
}

function goHome() {
  state.view = "home";
  state.round = null;
  state.selected = null;
  state.answered = false;
  state.showWhy = false;
  render();
}

function showHistory() {
  state.view = "history";
  render();
}

function exportData() {
  const data = JSON.stringify({ rounds: getRounds() }, null, 2);
  const blob = new Blob([data], { type: "application/json" });
  const url = URL.createObjectURL(blob);
  const a = document.createElement("a");
  a.href = url; a.download = "test-prep-history.json";
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
}

function resetData() {
  if (!confirm("確定要清除全部歷史紀錄嗎？此動作無法復原。")) return;
  localStorage.removeItem(STORAGE_KEY);
  goHome();
}

// Keyboard shortcuts — ignore when any modifier is held (so Cmd+C, Ctrl+A, etc. work normally)
document.addEventListener("keydown", (e) => {
  if (state.view !== "quiz") return;
  if (e.metaKey || e.ctrlKey || e.altKey) return;
  if (!state.answered) {
    const k = e.key.toUpperCase();
    if (["A","B","C","D"].includes(k)) selectOption(k);
  } else if (e.key === "Enter") {
    nextQuestion();
  } else if (e.key.toUpperCase() === "W") {
    toggleWhy();
  }
});

render();
</script>
