解:** 題目強調「部分更新不會出現、整體 all-or-nothing」— 這正是原子性(Atomicity)的定義:交易要嘛全部成功提交,要嘛全部回滾。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. Consistency 強調符合完整性約束(如外鍵、唯一性),非「部分成功」議題。\n- C. Isolation 處理並發交易互相干擾的問題。\n- D. Durability 保證提交後即便當機也不會遺失。\n\n**記憶要點:** All-or-nothing = Atomicity。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q19", "topic": "BigData/Processing", "question_text": "某製造企業導入上萬台物聯網(IoT)感測器以進行設備健康監測。系統需在毫秒級回應異常事件,並同時將完整資料保留於雲端供後續 AI 模型訓練與分析。若企業希望兼顧即時性、資料完整性與可擴展性,下列哪一種資料流程設計最符合此目標?", "options": {"A": "感測器 → 雲端 API Gateway → 分散式資料庫 → 批次特徵工程 → 模型推論", "B": "感測器 → MQTT Broker → 雲端資料倉儲 → 即時儀表板 → 模型再訓練", "C": "感測器 → 邊緣運算節點 → 流式資料處理框架(Stream Processing Framework)→ 雲端資料湖 → 模型推論", "D": "感測器 → 本地快取層 → RESTful API → 雲端報表系統 → 模型批次更新"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 5, "evidence": "answer column shows 'C' for question 19"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 「邊緣運算 + 流式處理 + 資料湖」三者搭配兼顧低延遲(邊緣減少網路 round trip)、即時分析(stream framework 如 Flink/Spark Streaming)與完整原始資料保留(資料湖儲存所有歷史),具備可擴展性。\n\n**其他選項為何錯:**\n- A. 批次特徵工程無法毫秒級回應。\n- B. 資料倉儲偏結構化,且需經 ETL,延遲較高。\n- C. ✓ 正解\n- D. REST 批次更新無法即時。\n\n**記憶要點:** IoT 即時 → Edge + Stream Processing + Data Lake。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q20", "topic": "Privacy", "question_text": "某銀行計畫將信用風險評估模型部署至雲端平台,以便即時分析客戶交易行為。由於涉及大量敏感金融資料,銀行要求雲端服務商在不解密原始資料的情況下仍能執行模型運算。為達成此目標,最適合採用下列哪一項技術?", "options": {"A": "在上傳資料前進行匿名化(Anonymization),僅保留可識別代碼供比對使用", "B": "利用雜湊(Hash)函數轉換資料,以確保模型可追蹤但無法還原個資", "C": "採用資料本地化(Data Localization)策略,將所有模型訓練限制於內部伺服器中", "D": "透過同態加密(Homomorphic Encryption),讓雲端系統能直接在加密資料上執行運算,解密後結果與原始資料一致"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 5, "evidence": "answer column shows 'D' for question 20"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 題目要求「雲端不解密就能運算」,正是同態加密的核心能力 — 在密文上做加法/乘法,解密後等於明文運算結果。\n\n**其他選項為何錯:**\n- A. 匿名化資料雖去除身分,但雲端仍以「明文」運算。\n- B. Hash 是單向,無法回復,也無法作模型運算的輸入。\n- C. 本地化等於不上雲,不符題目「部署至雲端」。\n- D. ✓ 正解\n\n**記憶要點:** 雲端 + 不解密 + 算 → Homomorphic Encryption。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q21", "topic": "Viz/Tools", "question_text": "某資料分析師設計在業務績效報告時,希望單一頁面中同時呈現多區域、不同產品線的銷售趨勢變化,並確保主管能在短時間內掌握整體資料走向。若依據 Edward Rolf Tufte 的數據密度(Data Density)原則,下列哪一種設計方式最能符合該概念?", "options": {"A": "將每個區域的銷售資料分成多張獨立折線圖,以避免資訊重疊", "B": "使用顏色區分產品線,於同一圖表中整合多區域趨勢線,保持比例一致且標註清晰", "C": "移除所有輔助線與標籤,僅保留主要折線以凸顯趨勢", "D": "將資料轉換為表格形式,確保數值精確呈現並取代圖表視覺化"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 6, "evidence": "answer column shows 'B' for question 21"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** Tufte 的 Data Density 原則強調「在有限版面中傳達盡可能多的有效資訊」,以顏色區分產品線、同圖整合多區域趨勢,正好提高資訊密度且保留比較性。\n\n**其他選項為何錯:**\n- A. 拆成多張小圖反而降低資料密度與比較性。\n- B. ✓ 正解\n- C. 移除標籤會犧牲可讀性,違反「資料-墨水比」原則的另一面向。\n- D. 表格無法快速傳達趨勢,違反高效視覺化目標。\n\n**記憶要點:** Data Density = 在同一個視覺空間中,擠進更多有效資訊。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q22", "topic": "Viz/Tools", "question_text": "某投資研究員希望分析四檔科技股(A、B、C、D)每日報酬率的變化趨勢,以判斷這些股票之間是否存在高度相關性與共變動性,並評估投資組合分散風險的程度。若研究員希望以單一圖表快速呈現各股票間的關聯強度與方向,下列哪一種視覺化呈現方式最適合?", "options": {"A": "為每檔股票各自繪製直方圖(Histogram)以比較報酬率分佈", "B": "針對任兩股股票繪製散佈圖並加上趨勢線(Regression Line)", "C": "使用雙軸折線圖(Dual-axis Line Chart)同時顯示四檔股價變化", "D": "熱力圖(Heatmap)配合相關係數矩陣(Correlation Matrix)"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 6, "evidence": "answer column shows 'D' for question 22"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 多檔股票兩兩之間的相關性,正是用相關係數矩陣計算 + 熱力圖呈現的典型情境;一張圖即可看出所有配對的強度與正負方向。\n\n**其他選項為何錯:**\n- A. 直方圖只看單一變數的分佈,不顯示兩兩關聯。\n- B. 兩兩散佈圖需要 C(4,2)=6 張圖,不夠精簡。\n- C. 雙軸圖只能比較兩條時間序列。\n- D. ✓ 正解\n\n**記憶要點:** 多變數兩兩相關 → Correlation Heatmap。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q23", "topic": "Stats/Hypothesis", "question_text": "某研究團隊以單樣本 t 檢定(one-sample t-test)檢驗「新行銷策略後的平均月銷售額是否與原本的 100 萬元不同」,顯著水準設定為 α=0.05。檢定結果顯示:p 值為 0.08,且 95% 信賴區間為 [95 萬元, 108 萬元]。根據上述結果,下列敘述何者正確?", "options": {"A": "因 p 值 < 0.05,可拒絕虛無假設", "B": "若顯著水準改為 0.10,仍不顯著", "C": "因 100 萬元落在信賴區間內,無法拒絕虛無假設", "D": "信賴區間寬度僅與顯著水準有關"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 6, "evidence": "answer column shows 'C' for question 23"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 95% 信賴區間 [95, 108] 包含 100,代表在 α=0.05 下無法拒絕「均值=100」的虛無假設;這與 p=0.08 > 0.05 的結論一致。\n\n**其他選項為何錯:**\n- A. p=0.08 ≥ 0.05,不能拒絕。\n- B. p=0.08 < 0.10,改用 α=0.10 反而會顯著。\n- C. ✓ 正解\n- D. 信賴區間寬度還與樣本變異、樣本數有關,不只顯著水準。\n\n**記憶要點:** 假設值落在 CI 內 ⇔ 對應雙尾檢定不顯著。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q24", "topic": "BigData/Storage", "question_text": "某企業建置生成式 AI 系統,利用大量客服紀錄與產品評論資料訓練語言模型,以自動生成客服回覆與知識摘要。由於資料來源多樣,且包含非結構化文字、影像與表格資訊,團隊希望在不降低模型效能的前提下,提升資料處理效率與一致性,下列哪一種資料處理策略最適合?", "options": {"A": "建立資料湖(Data Lake)架構,並以 Apache Spark 或 Ray 進行分散式資料預處理與特徵抽取,再串接至模型訓練管線(Pipeline)", "B": "採用單節點高效能伺服器搭配批次處理模式,集中執行資料清理與格式轉換", "C": "將所有文字資料轉換為向量,並以資料庫索引方式直接餵入語言模型訓練", "D": "使用生成式模型先行自動清理資料內容,再將結果輸入至下游訓練流程"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 6, "evidence": "answer column shows 'A' for question 24"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 資料湖適合儲存「異質、非結構化」大量資料;Spark / Ray 提供水平擴展的分散式處理框架,可高效預處理與特徵抽取後串接訓練。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 單節點無法擴展、效率受限。\n- C. 索引並非餵入訓練的方式,且跳過清理步驟。\n- D. 用生成式模型「自動清理」風險高,且不解決規模問題。\n\n**記憶要點:** 異質大資料 → Data Lake + 分散式處理框架(Spark/Ray)。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q25", "topic": "Viz/Tools", "question_text": "某電商資料團隊繪製顧客單筆消費金額的箱型圖後發現:四分位距(IQR)範圍極小,但上鬚線拉得很長,且在高金額區域有多筆離群值。若希望協助行銷部門依據消費層級設計分群策略,下列哪一種視覺化方式最有助於凸顯不同消費層級間的差異?", "options": {"A": "以對數刻度繪製箱型圖或長條圖,放大高金額消費族群的變化差異", "B": "移除所有離群值,確保資料呈現集中分布", "C": "採用等距分箱(Equal-Width Binning)方式分群", "D": "改以折線圖(Line Chart)觀察時間變化趨勢"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 7, "evidence": "answer column shows 'A' for question 25"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 右偏(長尾)且 IQR 很小的資料,線性刻度會把多數樣本擠在一起、高金額點散布在很遠處;改用對數刻度可均衡視覺空間,凸顯各消費層級的差異。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 移除高金額顧客等於丟失重要分群資訊。\n- C. 等距分箱對長尾分佈會讓多數高頻區擠在第一個箱。\n- D. 折線圖看時間趨勢,與消費分群目的不符。\n\n**記憶要點:** 長尾資料(右偏)→ 對數刻度視覺化。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q26", "topic": "Analytics/Methods", "question_text": "某串流影音平台運用關聯規則學習(Association Rule Learning)分析用戶的觀影行為,發現若使用者觀看了科幻影集,則有較高機率接著觀看超級英雄電影。分析顯示,同時觀看這兩種類型的使用者約佔全部觀影紀錄的 12%,而觀看科幻影集的使用者中,有 50% 也觀看了超級英雄電影,該規則的提升度(Lift)為 1.8。根據上述資訊,下列哪一項推論最為正確?", "options": {"A": "支持度(Support)過低,代表此規則不具任何商業價值", "B": "提升度(Lift)大於 1 表示兩種類型內容無關,僅屬於隨機重疊", "C": "信賴度(Confidence)為 50%,代表觀看科幻影集者有明顯傾向觀看超級英雄電影", "D": "同時觀看比例僅 12%,代表兩種類型互相排斥"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 7, "evidence": "answer column shows 'C' for question 26"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** Confidence(A→B) = P(B|A) = 50% 表示看了科幻影集的人中,有一半也看了超級英雄電影,顯示明顯傾向。\n\n**其他選項為何錯:**\n- A. 12% support 並不算過低,亦未必無商業價值。\n- B. Lift > 1 表示正相關(超過獨立假設),不是無關。\n- C. ✓ 正解\n- D. 12% 同時觀看 + Lift 1.8,顯示兩類正相關,並非互斥。\n\n**記憶要點:** Support = 同時發生的比例;Confidence = 條件機率;Lift > 1 = 正相關。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q27", "topic": "BigData/Processing", "question_text": "某金融科技公司分析每日上億筆交易資料,以監控客戶轉帳金額分佈與異常波動。由於資料量極大,為兼顧效率與準確度,團隊決定採用「近似分位數(Approximate Quantile)」方法進行資料摘要統計。下列何者最能正確反映該技術的核心目的?", "options": {"A": "確保每個分位值的結果完全精確,即使計算時間較長", "B": "利用機器學習模型預測分位數位置,以減少統計計算量", "C": "僅能對結構化資料進行批次處理,無法應用於即時資料流", "D": "在可容忍誤差範圍內,快速估算分位值以支援即時分析"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 7, "evidence": "answer column shows 'D' for question 27"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 大規模資料計算精確分位數需排序整體資料,代價高昂;近似分位數演算法(如 t-digest、GK)以「可控誤差」換取「線性時間 + 串流處理」,專為即時/巨量分析設計。\n\n**其他選項為何錯:**\n- A. 完全精確正是近似法所放棄的目標。\n- B. 與機器學習預測無關。\n- C. 近似分位數正是為串流而生。\n- D. ✓ 正解\n\n**記憶要點:** 近似分位數 = 用一點誤差換速度與可擴展性。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q28", "topic": "Analytics/Methods", "question_text": "若在高維度(>500 維)的資料上應用 DBSCAN(Density-Based Spatial Clustering of Applications with Noise)演算法,卻發現所有資料點皆被判定為雜訊(Noise),下列何者為最有可能的原因?", "options": {"A": "高維下距離變化趨同,導致 ε(Epsilon)閾值選擇失效", "B": "使用錯誤的距離函數(Distance Function)", "C": "MinPts 參數設得太小", "D": "資料過度標準化導致特徵消失"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 8, "evidence": "answer column shows 'A' for question 28"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 維度詛咒(Curse of Dimensionality)使高維空間中所有點對的距離趨於均勻,DBSCAN 賴以判定密度的 ε 閾值幾乎找不到合適值,所有點都成為孤立 → 全被判為雜訊。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 距離函數錯誤通常產生奇怪聚類,而非「全是雜訊」。\n- C. MinPts 太小反而更容易形成核心點,結果應該相反。\n- D. 標準化不會讓特徵消失。\n\n**記憶要點:** 高維 + 密度聚類 → 距離趨同、ε 失效是首要嫌疑;高維可先降維(PCA、UMAP)再用 DBSCAN。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q29", "topic": "FeatureEng", "question_text": "某團隊在開發風險評估模型時,使用主成分分析(Principal Component Analysis, PCA)進行降維。輸入資料包含三個數值欄位:「交易金額(單位:新台幣)」、「交易次數(次/月)」與「年齡(歲)」,其數值量級分別約為 10⁵、10¹ 與 10²。分析人員直接將原始數據帶入 PCA,結果第一主成分(PC1)幾乎完全由「交易金額」主導。下列哪一項作法或判斷最合理?", "options": {"A": "這是正常現象,金額本身變異較大,應主導主成分", "B": "若改用特徵選擇法,可自動解決變數量級問題", "C": "可刪除「交易金額」欄位以平衡各主成分的影響", "D": "在進行 PCA 前應預先進行標準化(Standardization),以避免因數值尺度差異造成特徵偏誤"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 8, "evidence": "answer column shows 'D' for question 29"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** PCA 是基於變異數的線性投影,變異越大的特徵越主導主成分。若不同特徵量級差異巨大(10⁵ vs 10¹),量級大的會壟斷 PC1。標準化(Z-score)讓每個特徵 std=1 後再做 PCA 才公平。\n\n**其他選項為何錯:**\n- A. 不該由「單位差異」決定主成分,這是偏誤。\n- B. 特徵選擇不解決尺度問題。\n- C. 直接刪除有價值的欄位是錯誤對策。\n- D. ✓ 正解\n\n**記憶要點:** PCA 前一定要標準化;否則大尺度特徵會偷走主成分。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q30", "topic": "Stats/Regression", "question_text": "某行銷團隊想了解「廣告預算」與「銷售金額」之間的關聯程度。經繪製散佈圖後發現兩者呈明顯線性趨勢,且資料中無明顯離群值(Outliers)。若希望衡量兩者之間線性關係的強度與方向,下列哪一種方法最適合?", "options": {"A": "均方根誤差(Root Mean Squared Error, RMSE)", "B": "共變異數(Covariance)", "C": "皮爾森相關係數(Pearson Correlation Coefficient)", "D": "平均絕對誤差(Mean Absolute Error, MAE)"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 8, "evidence": "answer column shows 'C' for question 30"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** Pearson 相關係數 r ∈ [−1, 1] 提供「強度」(絕對值)與「方向」(正負號)兩種資訊,正是衡量線性關係的標準工具。\n\n**其他選項為何錯:**\n- A. RMSE 是預測誤差,非關聯強度。\n- B. Covariance 雖反映方向但其值受單位影響,無法直接判斷強度。\n- C. ✓ 正解\n- D. MAE 同樣是誤差指標。\n\n**記憶要點:** 線性關聯強度+方向 → Pearson r;Covariance 除以兩變數的 std 即得 Pearson。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q31", "topic": "Stats/Probability", "question_text": "某電商團隊觀察到,每位顧客對廣告推播的點擊行為可視為一次伯努利試驗(Bernoulli Trial),單次點擊成功機率為 p=0.4。當推播對象擴增至 5,000 位顧客時,團隊想快速預估「成功點擊總數」的分佈情形,以進行模型效能模擬與預測。若希望以常態分佈(Normal Distribution)近似原始分佈,下列哪一項判斷最為合理?", "options": {"A": "因樣本數極大,可直接以常態分佈近似二項分佈(Binomial Distribution)", "B": "只有當 np 與 n(1−p) 皆大於 5 時,才能以常態分佈作近似", "C": "常態近似只適用於 p=0.5 的情況", "D": "無論樣本數多大,二項分佈都不能以常態分佈近似"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 8, "evidence": "answer column shows 'B' for question 31"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** Binomial → Normal 近似的常見經驗法則(De Moivre–Laplace 定理)要求 np ≥ 5 且 n(1−p) ≥ 5(部分教材用 ≥ 10),避免分佈過於偏斜。\n\n**其他選項為何錯:**\n- A. 樣本數大也要看 p 是否極端(極端時偏態強)。\n- B. ✓ 正解\n- C. p=0.5 對稱性最好,但不是唯一可近似條件。\n- D. 大 n 配合條件成立時可近似。\n\n**記憶要點:** Binomial → Normal 近似條件:np ≥ 5 且 n(1−p) ≥ 5。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q32", "topic": "Privacy", "question_text": "某電信公司導入生成式 AI 客服系統,利用過去對話紀錄與用戶行為資料訓練語言模型,在資料治理與合規審查過程中,團隊發現模型可能會在回答中生成包含真實姓名、電話或交易資訊的內容。為確保系統符合個資法及生成式 AI 的安全與隱私要求,下列哪一項作法最符合實務可行及法規原則?", "options": {"A": "在訓練資料前進行資料匿名化(Anonymization)或偽匿名化(Pseudonymization)處理,並建立輸出內容稽核機制", "B": "改以強化學習(Reinforcement Learning)微調模型,使模型學會避免產出真實資訊", "C": "採用同態加密(Homomorphic Encryption)以加密所有文字輸入,確保模型無法辨識任何個資", "D": "僅設定模型回覆時不顯示用戶姓名,即可視為隱私防護完成"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 9, "evidence": "answer column shows 'A' for question 32"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 隱私防護的最佳實務是「source 端去識別 + 輸出端稽核」雙層;在訓練前匿名化/偽匿名化可從源頭降低洩漏風險,加上輸出稽核可防範生成幻覺式洩漏。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. RL 無法保證避免洩漏,且需 reward 設計,難以稽核。\n- C. 同態加密用於計算過程的密文運算,不適合語言模型訓練的非結構化文字。\n- D. 只遮姓名不夠,電話、交易資訊仍會洩漏。\n\n**記憶要點:** 隱私 = Source 端去識別 + Output 端稽核,單一層級不足。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q33", "topic": "Stats/Hypothesis", "question_text": "某金融機構的量化分析師在建立資產風險評估模型時,發現報酬率資料分佈明顯非對稱,且出現多次極端損失事件,使得傳統假設常態分佈的模型無法準確反映真實風險。若希望在不依賴常態分佈假設的前提下,採取更能捕捉資料極端情況的建模策略,下列哪一種方法最為合適?", "options": {"A": "採用線性迴歸模型(Linear Regression Model),以常態分佈殘差(Residuals)為基礎進行推估", "B": "使用平均數(Mean)與標準差(Standard Deviation)估計波動範圍", "C": "將資料裁剪至 ±3σ 範圍內以排除異常值影響", "D": "採用分位數迴歸模型(Quantile Regression Model),聚焦於尾部分位(Tail Quantiles)以評估極端風險"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 9, "evidence": "answer column shows 'D' for question 33"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 分位數迴歸不假設殘差為常態,可針對任意分位(如 0.05、0.95)建模,適合極端尾部風險(如 VaR、CVaR)分析。\n\n**其他選項為何錯:**\n- A. 仍依賴常態殘差假設。\n- B. Mean/Std 在非常態與重尾下無法反映尾部風險。\n- C. 裁剪極端值反而會掩蓋風險。\n- D. ✓ 正解\n\n**記憶要點:** 重尾、不對稱 → Quantile Regression;傳統 OLS 假設殘差常態且同方差。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q34", "topic": "BigData/Storage", "question_text": "在圖形資料庫(Graph Database)中建模社群平台資料時,若每筆「按讚」行為都包含時間戳記(Timestamp)與裝置類型(Device Type)等資訊。若希望同時保留使用者與貼文之間的互動關係,並能有效查詢「按讚」的行為屬性,下列哪一種設計方式最為合適?", "options": {"A": "將「按讚」視為節點(Node),與使用者建立邊(Edge)", "B": "將「按讚」資訊作為邊的屬性(Property)儲存,連結使用者與被按讚的貼文節點", "C": "把「按讚」資訊直接寫入使用者節點中作為屬性", "D": "建立「按讚紀錄表」並將資料存入關聯式資料庫"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 9, "evidence": "answer column shows 'B' for question 34"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 圖資料庫的典型建模:使用者 -[LIKED {timestamp, device}]→ 貼文。把「按讚」當邊、把時間/裝置作邊的屬性,既保留關係又支援屬性查詢。\n\n**其他選項為何錯:**\n- A. 將「按讚」做成節點會多一層 hop,查詢與儲存效率較差(雖然可行)。\n- B. ✓ 正解\n- C. 寫入使用者節點失去「按了哪則貼文」的關聯。\n- D. 用 RDBMS 違背使用圖資料庫的初衷。\n\n**記憶要點:** 圖建模:節點 = 實體,邊 = 關係,邊屬性 = 關係的細節。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q35", "topic": "BigData/Storage", "question_text": "某企業欲建構知識圖譜(Knowledge Graph),以整合內部的研究報告、專利資料與專家知識,並支援語意查詢與關聯推理。若希望模型能具備良好的語意擴展性與高效推理能力,下列哪一種圖模型設計最為合適?", "options": {"A": "僅以節點(Node)與邊(Edge)表示,所有資訊存放於節點屬性中", "B": "將資料結構建為 RDF(Resource Description Framework)三元組(Subject-Predicate-Object)", "C": "使用文件型資料庫儲存內容,並以標籤(Tag)連接節點", "D": "採用關聯式資料庫儲存對應關係,並搭配預建索引加速查詢"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 9, "evidence": "answer column shows 'B' for question 35"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** RDF 三元組(主語-謂詞-賓語)是知識圖譜的標準資料模型,搭配 OWL/RDFS 等本體論可進行語意推理,且生態工具(SPARQL、Reasoner)成熟。\n\n**其他選項為何錯:**\n- A. 純屬性圖難以做語意推理,擴展性有限。\n- B. ✓ 正解\n- C. 文件型 NoSQL 不適合複雜關聯推理。\n- D. RDBMS join 在多跳關聯查詢上效率差。\n\n**記憶要點:** 知識圖譜的標準資料模型 = RDF 三元組;查詢語言 = SPARQL。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q36", "topic": "Stats/Regression", "question_text": "某研究人員欲使用線性迴歸模型(Linear Regression Model)分析變數 Y 與 X 之間的關係,但發現 Y 的分佈明顯右偏,且其變異數隨 X 的增大而增加。為滿足模型假設並提升配適效果,下列哪一種前處理方法最為合適?", "options": {"A": "對 X 進行標準化(Standardization)", "B": "對 Y 進行 Box-Cox 轉換(Box-Cox Transformation)", "C": "對資料進行一次差分(First Differencing)", "D": "對 Y 中變異較大的樣本移除"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 9, "evidence": "answer column shows 'B' for question 36"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** Box-Cox 轉換可同時改善「右偏」與「異質變異(heteroscedasticity)」,讓 Y 趨近常態與等變異,正符合 OLS 假設。\n\n**其他選項為何錯:**\n- A. 對 X 標準化不改變 Y 的分佈或變異結構。\n- B. ✓ 正解\n- C. 一次差分用於時間序列趨勢/單根問題,非偏態。\n- D. 移除大變異樣本會丟失資訊且選樣偏誤。\n\n**記憶要點:** 右偏 + 變異隨 X 增大 → Box-Cox(或 log)轉換 Y。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q37", "topic": "Analytics/Methods", "question_text": "若開發一個用於罕見疾病自動診斷的分類模型,目前資料集中確診樣本僅佔不到 1%,且因為標註成本太高,短期內無法取得更多資料。在此情況下,若希望提升模型對少數類的偵測能力,同時避免過擬合,下列哪一種策略最為合理?", "options": {"A": "對少數類進行隨機過採樣(Random Oversampling)", "B": "對多數類進行欠採樣(Random Undersampling)", "C": "使用 SMOTE(Synthetic Minority Over-sampling Technique)生成合成少數樣本後再訓練分類模型", "D": "僅使用現有資料調整模型決策閾值(Decision Threshold)以提升召回率"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 10, "evidence": "answer column shows 'C' for question 37"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** SMOTE 透過鄰近少數類樣本進行線性插值生成新樣本,既能平衡類別分佈,又比單純複製(Random Oversampling)更不易過擬合。\n\n**其他選項為何錯:**\n- A. 直接複製易過擬合(見 Q12)。\n- B. 在已經樣本不足的情況下,欠採樣多數類會丟失資訊。\n- C. ✓ 正解\n- D. 只調整閾值無法改善模型對少數類特徵的學習。\n\n**記憶要點:** 不平衡資料 + 想避免過擬合 → SMOTE 合成新樣本。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q38", "topic": "Stats/Hypothesis", "question_text": "一家製造廠評估新生產線推出後,產品良率是否較原生產線提升。工程師分別從兩條生產線各抽樣 100 件產品,原生產線良率為 95%,新生產線為 97%。若欲檢定兩條生產線良率的差異是否具有統計意義,下列哪一種方法最為合適?", "options": {"A": "雙樣本平均數 t 檢定(Two-sample t-test)", "B": "雙比例 Z 檢定(Two-proportion Z-test)", "C": "卡方檢定(Chi-square test)", "D": "變異數分析(ANOVA)"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 10, "evidence": "answer column shows 'B' for question 38"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 良率是「比例」(成功/總數),比較兩組比例差異,標準工具是 Two-proportion Z-test(p₁ − p₂ 的 Z 檢定)。\n\n**其他選項為何錯:**\n- A. t-test 用於連續變數的平均數差。\n- B. ✓ 正解\n- C. 卡方檢定處理列聯表獨立性,亦可用於 2×2 表 (與 Z-test 結論相同),但題目要求最合適的「比例差」方法。\n- D. ANOVA 比較三組以上平均數。\n\n**記憶要點:** 兩比例差 → Z-test (Two-proportion);三組以上平均 → ANOVA。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q39", "topic": "Analytics/Methods", "question_text": "若評估一個新開發的腫瘤分類模型,其資料集中有 80% 的樣本來自良性病例。若直接使用 5-fold 交叉驗證(Cross-Validation)進行模型評估,可能導致模型效能評估出現偏差,為避免此問題,下列哪一種作法最合適?", "options": {"A": "降低 K 值以減少交叉驗證次數", "B": "改為使用拔靴法(Bootstrap)", "C": "調整測試集使良性樣本比例更高,以模擬真實分佈", "D": "使用分層交叉驗證(Stratified K-Fold Cross-Validation),以確保每折類別比例一致"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 10, "evidence": "answer column shows 'D' for question 39"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 在類別不平衡資料上,普通 K-fold 可能讓某折幾乎沒有少數類樣本;Stratified K-Fold 維持每一折的類別比例與整體一致,得到較穩定的效能估計。\n\n**其他選項為何錯:**\n- A. 降 K 值不解決分層問題。\n- B. Bootstrap 也不必然保證類別比例。\n- C. 故意拉高良性比例反而加劇偏差。\n- D. ✓ 正解\n\n**記憶要點:** 不平衡 + CV → Stratified K-Fold。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q40", "topic": "Analytics/Methods", "question_text": "請參考附圖,下列虛擬程式碼(pseudocode)最可能是在描述何種驗證法?\n\n```\nInput:\n  - data_set: 包含 N 筆資料的資料集\n  - model_training_function: 用來訓練模型的函式\n  - model_evaluation_function: 用來評估模型的函式\nOutput:\n  - 平均評估指標\n\nAlgorithm:\n1. 初始化評估指標列表 metrics = []\n2. 對 i = 1 到 N:\n   a. 將第 i 筆資料作為測試集 test_data\n   b. 將其餘 N-1 筆資料作為訓練集 train_data\n   c. 使用 model_training_function 在 train_data 上訓練模型\n   d. 使用訓練好的模型對 test_data 做預測,計算評估指標 metric_i\n   e. 將 metric_i 加入 metrics\n3. 計算 metrics 的平均值 mean_metric\n4. 回傳 mean_metric\n```", "options": {"A": "Hold-out 驗證(Hold-out Validation)", "B": "留一交叉驗證 LOOCV(Leave-One-Out Cross Validation)", "C": "K-fold 交叉驗證(K-fold Cross Validation)", "D": "拔靴法(Bootstrap)驗證"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 11, "evidence": "answer column shows 'B' for question 40"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 演算法在每次迭代「只抽 1 筆作測試、其餘 N−1 筆訓練」,總共做 N 次 — 這就是 Leave-One-Out Cross Validation(LOOCV)的定義。\n\n**其他選項為何錯:**\n- A. Hold-out 只切一次訓練/測試,不會跑 N 次。\n- B. ✓ 正解\n- C. K-fold 將資料切 K 等份,每次 1 份當測試;K = N 時退化為 LOOCV,但題目以一筆為單位明確說明是 LOOCV。\n- D. Bootstrap 使用有放回抽樣建多組訓練/測試,流程不同。\n\n**記憶要點:** N 筆 → N 次驗證 → LOOCV。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q41", "topic": "Analytics/Methods", "question_text": "請參考附圖,下列虛擬程式碼(pseudocode)最可能是在描述何種演算法?\n\n```\nInput:\n  - data_points: N 筆資料,每筆資料有 D 個特徵\n  - X: 要分成的群數\nOutput:\n  - clusters: 每筆資料所屬的群編號\n  - centroids: 每個群的中心點\n\nAlgorithm:\n1. 隨機選擇 X 個資料點作為初始中心\n2. 重複以下步驟直到收斂:\n   a. 分群: 對每個資料點,計算它到每個中心的距離,將資料點指派給距離最近的中心\n   b. 更新中心: 對每個群:計算該群中所有資料點的平均值,將群中心更新為這個平均值\n3. 當群中心不再變動時,停止\n```", "options": {"A": "K-means 分群(K-means Clustering)", "B": "高斯混合模型分群(Gaussian Mixture Model Clustering)", "C": "階層式分群(Hierarchical Clustering)", "D": "DBSCAN 分群"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 12, "evidence": "answer column shows 'A' for question 41"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 「隨機初始中心 → 指派最近中心 → 重新計算各群平均作為新中心 → 反覆直到收斂」是 K-means 的標準 Lloyd's 演算法流程。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. GMM 用 EM 演算法估計高斯參數(平均+共變異),不是直接取平均。\n- C. 階層式分群基於距離合併/分裂,不需要事先指定中心。\n- D. DBSCAN 基於密度,不使用中心點。\n\n**記憶要點:** 「指定 K + 平均更新中心」= K-means。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q42", "topic": "Stats/Probability", "question_text": "考慮某生產線每小時出現瑕疵品的個數符合卜瓦松分佈(Poisson Distribution),已知平均每小時產生 5 個瑕疵品,附圖程式碼展示資料處理,請問下列敘述何者正確?\n\n```python\nimport numpy as np\nfrom scipy.stats import poisson\nlambda_poisson = 5\nprint(poisson.pmf(5, lambda_poisson))\n```", "options": {"A": "lambda_poisson = 5 表示每小時最多 5 個瑕疵品", "B": "poisson.pmf(5, lambda_poisson) 表示小於 5 個瑕疵品的機率", "C": "卜瓦松分佈的適用條件為事件彼此獨立,且平均發生率固定", "D": "poisson.cdf(10, 5) 表示大於或等於 10 個瑕疵品的機率"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 12, "evidence": "answer column shows 'C' for question 42"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** Poisson 分佈三大假設:事件獨立、單位時間內平均發生率 λ 固定、稀有事件;選項 C 正是該條件的標準敘述。\n\n**其他選項為何錯:**\n- A. λ=5 是「平均」每小時 5 個,不是「最多」。\n- B. `pmf(5, λ)` 是「恰好等於 5」的機率,不是「小於 5」。\n- C. ✓ 正解\n- D. `cdf(10, 5)` = P(X ≤ 10),是小於或等於 10 的機率。\n\n**記憶要點:** PMF = 恰好;CDF = 累積到該值(含)。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q43", "topic": "Analytics/EDA", "question_text": "[此題使用 vgsales.csv 情境]\n\n```python\ndata['Year']\n# 0     2006.0\n# 1     1985.0\n# ...\n# Name: Year, Length: 16598, dtype: float64\n```\n\n分析師在載入資料後,檢視 Year 欄位的資料型態,發現它是 float64,而非一般年份常用的整數。他想了解這樣的情形為什麼會發生。請問下列哪些原因可能導致這種狀況?\n\n原因 A:CSV 檔中 Year 欄位有缺失值(NaN),導致 Pandas 自動將整欄轉為浮點數。\n原因 B:CSV 檔中的年份資料原本是字串(如 \"2006\"),Pandas 轉換時出錯而變成浮點數。\n原因 C:Pandas 預設將所有數值型態讀取為 float64,不論資料是否為整數。\n原因 D:CSV 檔中的年份資料可能包含小數點(例如 2006.0),因此被視為浮點數。", "options": {"A": "原因 B、原因 C", "B": "原因 A、原因 D", "C": "原因 A、原因 B、原因 D", "D": "原因 C、原因 D"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 14, "evidence": "answer column shows 'B' for question 43"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** \n- 原因 A 正確:Pandas 整數型態不支援 NaN,有缺失值會自動升級為 float64。\n- 原因 D 正確:CSV 內若已有 2006.0 這種帶小數點寫法,Pandas 會以 float 讀取。\n- 原因 B 錯誤:字串無法「轉換出錯就變浮點數」,只會留為 object。\n- 原因 C 錯誤:Pandas 預設整數會用 int64,並非全部讀為 float。\n\n**其他選項為何錯:**\n- A. 包含 B,但 B 錯誤。\n- B. ✓ 正解\n- C. 包含 B,B 錯誤。\n- D. 包含 C,C 錯誤。\n\n**記憶要點:** Int 欄位若有 NaN → Pandas 升級為 float64(或使用 Int64 nullable type)。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q44", "topic": "Analytics/EDA", "question_text": "研究團隊接下來想將 Year 欄位轉換為整數型態,以便後續進行年份趨勢分析。考慮到資料中可能包含缺失值(NaN),請選出最適合的轉換方式。", "options": {"A": "data['Year'] = data['Year'].astype(int);", "B": "data['Year'] = data['Year'].fillna(0).astype(int);", "C": "data['Year'] = data['Year'].fillna(1).astype(int);", "D": "data['Year'] = data['Year'].astype('Int64');"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 14, "evidence": "answer column shows 'D' for question 44"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** Pandas 的 `'Int64'`(大寫 I,Nullable Integer)型態原生支援 NaN,可在不破壞缺失值資訊的情況下轉為整數,適合後續分析。\n\n**其他選項為何錯:**\n- A. `astype(int)` 若欄位含 NaN 會直接報錯。\n- B. `fillna(0)` 把缺失值偽造為 0 年,污染年份分析。\n- C. `fillna(1)` 同理,且 1 年更不合理。\n- D. ✓ 正解\n\n**記憶要點:** 想保留 NaN 的整數欄位 → `astype('Int64')`(注意大寫 I)。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q45", "topic": "Analytics/EDA", "question_text": "為了觀察各遊戲平台的市場表現,分析師想要統計每個平台的全球銷售總額,並以長條圖呈現。請選出最能正確實現此分析的程式碼。", "options": {"A": "data.groupby(\"Platform\")[\"Global_Sales\"].sum().plot(kind=\"bar\");", "B": "data.groupby(\"Platform\")[\"Global_Sales\"].count().plot(kind=\"bar\");", "C": "data[\"Platform\"].value_counts().plot(kind=\"bar\");", "D": "data.groupby(\"Platform\")[\"Global_Sales\"].mean().plot(kind=\"bar\")"}, "correct_answer": "A", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 14, "evidence": "answer column shows 'A' for question 45"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 「銷售總額」= 對每個平台的 Global_Sales 加總,正確語法為 `groupby('Platform')['Global_Sales'].sum()`。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. `count()` 統計筆數,不是金額加總。\n- C. `value_counts()` 計算各平台遊戲數,不涉及銷售金額。\n- D. `mean()` 是平均,非總額。\n\n**記憶要點:** 總和 → sum;筆數 → count / value_counts;平均 → mean。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q46", "topic": "Analytics/EDA", "question_text": "團隊希望比較北美、歐洲、日本及其他地區的整體銷售比例,並使用 seaborn 套件以長條圖的形式進行可視化分析。請選出能正確顯示這些地區銷售總額比例的程式碼。", "options": {"A": "sns.countplot(x=[\"NA_Sales\",\"EU_Sales\",\"JP_Sales\",\"Other_Sales\"], data=data);", "B": "sns.lineplot(x=\"Platform\", y=[\"NA_Sales\",\"EU_Sales\",\"JP_Sales\",\"Other_Sales\"], data=data);", "C": "sns.barplot(x=\"variable\", y=\"value\", data=pd.melt(data, value_vars=[\"NA_Sales\",\"EU_Sales\",\"JP_Sales\",\"Other_Sales\"]), estimator=sum);", "D": "sns.histplot(data=data[[\"NA_Sales\",\"EU_Sales\",\"JP_Sales\",\"Other_Sales\"]])"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 15, "evidence": "answer column shows 'C' for question 46"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 多個寬格式銷售欄位需先用 `pd.melt` 轉成長格式(variable/value),再用 `sns.barplot` 搭配 `estimator=sum` 對每個地區加總,即可比較。\n\n**其他選項為何錯:**\n- A. `countplot` 只計次數,且 x 參數不能直接傳欄位名清單。\n- B. `lineplot` 不適合單一時點的比例比較,且 y 不能傳清單。\n- C. ✓ 正解\n- D. `histplot` 顯示分佈而非總和比較。\n\n**記憶要點:** 寬轉長 = `pd.melt`;以總和畫條 → `barplot(estimator=sum)`。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q47", "topic": "Analytics/EDA", "question_text": "研究團隊想要知道在北美地區(NA)銷售成績最好的遊戲前五名,並希望以 seaborn 的條狀圖呈現結果。請選出能正確完成這項分析的程式碼。", "options": {"A": "sns.barplot(x=\"NA_Sales\", y=\"Name\", data=data.head(5));", "B": "sns.barplot(x=\"Name\", y=\"NA_Sales\", data=data.nlargest(5, \"NA_Sales\"));", "C": "sns.lineplot(x=\"Name\", y=\"NA_Sales\", data=data.nlargest(5, \"NA_Sales\"));", "D": "sns.countplot(x=\"Name\", y=\"NA_Sales\", data=data)"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 15, "evidence": "answer column shows 'B' for question 47"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** `data.nlargest(5, 'NA_Sales')` 取得 NA_Sales 最高的 5 筆,然後 `sns.barplot(x='Name', y='NA_Sales', ...)` 畫條狀圖即可正確呈現前五名。\n\n**其他選項為何錯:**\n- A. `data.head(5)` 是前五筆,不是前五名銷售。\n- B. ✓ 正解\n- C. lineplot 不適合呈現排名比較。\n- D. countplot 統計次數,且不接受 y 參數的數值欄位。\n\n**記憶要點:** Top-K → `nlargest(K, col)`;Bar 比較 → `sns.barplot`。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q48", "topic": "Analytics/EDA", "question_text": "[使用 marketing.csv,df.describe() 結果已顯示]\n\n根據上述結果,下列何者正確?", "options": {"A": "資料集個數為 199 筆,變數個數為 4 個", "B": "sales 變數的中位數是 16.827", "C": "facebook 變數的第三四分位數(Q3)是 11.94", "D": "youtube 變數的第一四分位數(Q1)是 89.25"}, "correct_answer": "D", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 16, "evidence": "answer column shows 'D' for question 48"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 由 `describe()` 結果,youtube 欄位的 25% (Q1) = 89.25,選項 D 完全對應。\n\n**其他選項為何錯:**\n- A. count 為 200(facebook 含 1 個 NaN 才顯示 199),變數個數含 sales 共 4 個,但「資料集個數」應為 200。\n- B. sales 的中位數(50%)是 15.48;16.827 是 mean。\n- C. facebook 的 Q3 是 43.68;11.94 是 Q1。\n- D. ✓ 正解\n\n**記憶要點:** describe() 的列順序:count, mean, std, min, 25% (Q1), 50% (median), 75% (Q3), max。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q49", "topic": "Analytics/EDA", "question_text": "參考下圖計算各變數的遺漏值(NaN)個數結果,下列何者正確?\n\n```\nyoutube      0\nfacebook     1\nnewspaper    0\nsales        0\ndtype: int64\n```\n\n選項 A: df.isnull().sum()\n選項 B: df.isNaN().sum()\n選項 C: df.isna().sum()\n選項 D: df.isnan().sum()", "options": {"A": "選項 D", "B": "選項 B、選項 C、選項 D", "C": "選項 A、選項 C", "D": "選項 A、選項 B、選項 C"}, "correct_answer": "C", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 16, "evidence": "answer column shows 'C' for question 49"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** pandas 中正確的缺失值偵測方法只有 `isnull()` 與其別名 `isna()`,兩者完全等價且皆可加 `.sum()` 統計;`isNaN()`、`isnan()` 不是 DataFrame 的方法。\n\n**其他選項為何錯:**\n- A. 包含不存在的 D。\n- B. B 與 D 都不存在。\n- C. ✓ 正解\n- D. 包含不存在的 B。\n\n**記憶要點:** pandas 缺值 → `isnull()` 或 `isna()`;沒有 `isnan / isNaN`(那是 NumPy 的 `np.isnan`)。", "subject_code": "s2"}, {"id": "exam-s2-114-2-q50", "topic": "Stats/Regression", "question_text": "考慮資料集已經補填遺漏值,參考下圖執行結果(OLS Regression Results: R² = 0.898, F-stat = 573, intercept = 3.5561, youtube coef = 0.0455 p=0, facebook coef = 0.1891 p=0, newspaper coef = -0.0006 p=0.914),下列何者正確?\n\nA:空格1完整語法 reg = LinearRegression().fit(y, X)\nB:空格1完整語法 reg = LinearRegression().fit(X, y)\nC:print(reg.coef_) 結果為包括截距項等 4 個係數值\nD:空格2完整語法 sm.OLS(X2, y).fit()\nE:model_sm 迴歸模型的所有迴歸係數在 α=0.05 之下具有顯著的解釋力\nF:截距項係數值為 3.5561", "options": {"A": "B、C、F", "B": "B、F", "C": "A、C、D、F", "D": "B、E"}, "correct_answer": "B", "source": {"file": "subjects/2-bigdata/past-exam.pdf", "page": 17, "evidence": "answer column shows 'B' for question 50"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** \n- B 正確:`fit(X, y)` 是 sklearn 的標準呼叫順序(先特徵後標籤)。\n- F 正確:截距項 const 的 coef = 3.5561,直接從表格讀出。\n- A 錯:`fit(y, X)` 順序顛倒。\n- C 錯:`reg.coef_` 只回傳特徵係數(3 個),截距在 `reg.intercept_`。\n- D 錯:`sm.OLS` 的呼叫是 `sm.OLS(y, X2).fit()`,順序是先 y 後 X。\n- E 錯:newspaper 的 p=0.914 > 0.05,並非「所有係數都顯著」。\n\n**其他選項為何錯:**\n- A. 包含錯誤敘述 C。\n- B. ✓ 正解\n- C. 含 A、D。\n- D. 含錯誤敘述 E。\n\n**記憶要點:** sklearn 順序 `(X, y)`;statsmodels OLS 順序 `(y, X)`,兩者相反 — 常考易錯點。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q1", "topic": "Stats/Hypothesis", "question_text": "在巨量資料分析班中,共有一年級至四年級,每個年級有 50 個學生,且學生身高呈常態分佈。下列敘述何者不正確?", "options": {"A": "要檢測一年級和二年級的平均身高是否有差異,可以利用 t 檢定", "B": "要檢測一年級、二年級、三年級之間的平均身高是否有差異,可以利用 t 檢定", "C": "要檢測二年級、三年級、四年級之間的平均身高是否有差異,可以利用 F 檢定", "D": "要檢測一年級的平均身高是否等於 170 公分,可以利用卡方檢定"}, "correct_answer": "D", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'D' for question 1"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是錯誤(即為「不正確」的選項,故為正解):** 卡方檢定主要用於「類別變數的獨立性 / 適合度」檢驗,不是用於連續變數的平均數;檢驗單組平均數是否等於某常數應使用單樣本 t 檢定。\n\n**其他選項為何錯(此題找錯誤敘述):**\n- A. 兩組平均比較用 t 檢定,正確。\n- B. 三組以上嚴格說用 ANOVA(F 檢定),但兩兩比較仍可用多次 t-test(附加多重比較校正);敘述未必錯。\n- C. 三組以上平均差異 → F 檢定(ANOVA),正確。\n- D. ✓ 正解(此敘述錯誤)\n\n**記憶要點:** 卡方 → 類別變數;t/F → 連續變數平均數比較。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q2", "topic": "ROC/AUC", "question_text": "關於接受者操作特徵(ROC)曲線,下列敘述何者正確?", "options": {"A": "ROC 曲線繪製了真陽性率與假陽性率的關係", "B": "ROC 曲線用於評估模型的準確性", "C": "ROC 曲線下的面積(AUC-ROC)始終等於 1", "D": "ROC 曲線只適用於二元分類問題"}, "correct_answer": "A", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'A' for question 2"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** ROC 曲線的縱軸為 TPR(真陽性率/Recall),橫軸為 FPR(假陽性率),展示在不同分類閾值下兩者的 trade-off。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. ROC/AUC 評估的是「排序能力」而非單一準確率(Accuracy)。\n- C. AUC 介於 0~1,完美模型才為 1;隨機猜測為 0.5。\n- D. ROC 可延伸至多類分類(One-vs-Rest)。\n\n**記憶要點:** ROC 軸 = TPR vs FPR;AUC = 曲線下面積。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q3", "topic": "FeatureEng", "question_text": "下列何者不屬於特徵工程(Feature Engineering)?", "options": {"A": "轉換(Transformation)", "B": "萃取(Extraction)", "C": "挑選(Selection)", "D": "預測(Prediction)"}, "correct_answer": "D", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'D' for question 3"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 預測是模型訓練後輸出階段的工作,不屬於資料準備階段的特徵工程範疇。\n\n**其他選項為何錯:**\n- A. 特徵轉換是常見特徵工程動作。\n- B. 特徵萃取(如 PCA、TF-IDF)屬於特徵工程。\n- C. 特徵選擇屬於特徵工程。\n- D. ✓ 正解\n\n**記憶要點:** 特徵工程 4 大件:Transformation、Extraction、Selection、Construction(Derivation);Prediction 是模型輸出。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q4", "topic": "Analytics/Methods", "question_text": "拉拉網路商城的老闆擬透過機器學習的方式,利用過往的產品銷售資料,預測下一季的產品銷售數量,以調整現有的庫存水位。下列哪一個類型的模型,比較適合應用在老闆期望的預測目標?", "options": {"A": "決策樹分類器(Decision Tree Classifier)", "B": "K-means 分群(K-means Clustering)", "C": "主成份分析(Principal Component Analysis, PCA)", "D": "線性迴歸(Linear Regression)"}, "correct_answer": "D", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'D' for question 4"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 預測「下一季銷售數量」是連續數值預測(Regression),最直接的模型即為線性迴歸。\n\n**其他選項為何錯:**\n- A. 決策樹分類器是分類(類別輸出)。\n- B. K-means 是分群(無監督),不做數值預測。\n- C. PCA 是降維工具,不是預測模型。\n- D. ✓ 正解\n\n**記憶要點:** 預測數量(連續值)→ Regression(線性迴歸最基礎)。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q5", "topic": "FeatureEng", "question_text": "對於低結構化的文本或圖像資料,下列哪一種特徵工程(Feature Engineering)方法最為適用?", "options": {"A": "特徵改善(Feature Improvement)", "B": "特徵建構(Feature Construction)", "C": "特徵學習(Feature Learning)", "D": "特徵選擇(Feature Selection)"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'C' for question 5"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 非結構化資料(文字、影像)難以人工定義特徵,Feature Learning(如 word embeddings、CNN 自動學特徵、自監督表示學習)是最適合的方法。\n\n**其他選項為何錯:**\n- A. 特徵改善是修整既有特徵,需先有特徵可改。\n- B. 特徵建構偏向手工從結構化欄位組合新特徵。\n- C. ✓ 正解\n- D. 特徵選擇是從現有特徵中挑子集。\n\n**記憶要點:** 非結構化 → Feature Learning(深度學習自動學特徵)。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q6", "topic": "FeatureEng", "question_text": "下列哪種方法屬於非監督式學習中的降維技術?", "options": {"A": "K-均值聚類(K-means)", "B": "隨機森林(Random Forest)", "C": "支持向量機(SVM)", "D": "主成分分析(PCA)"}, "correct_answer": "D", "source": {"file": "shared/sample-questions.pdf", "page": 5, "evidence": "answer column shows 'D' for question 6"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** PCA 是非監督式降維方法的代表,將高維資料投影到主成分構成的低維空間,保留最大變異。\n\n**其他選項為何錯:**\n- A. K-means 是非監督但屬於「分群」,非降維。\n- B. Random Forest 是監督式分類/迴歸。\n- C. SVM 是監督式分類/迴歸。\n- D. ✓ 正解\n\n**記憶要點:** 非監督降維 = PCA、t-SNE、UMAP、Autoencoder。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q7", "topic": "BigData/Cleaning", "question_text": "異常值偵測使用 IQR(Interquartile Range)法時,下列哪一種範圍外的數值會被視為異常?", "options": {"A": "超過 Q2 ± 2×IQR", "B": "高於 Q1 − IQR 或低於 Q3 + IQR", "C": "高於 Q1 − 2×IQR 或低於 Q3 + 2×IQR", "D": "低於 Q1 − 1.5×IQR 或高於 Q3 + 1.5×IQR"}, "correct_answer": "D", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'D' for question 7"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** Tukey 提出的標準 IQR 異常值法:下界 = Q1 − 1.5×IQR,上界 = Q3 + 1.5×IQR;之外的點即視為 outlier。\n\n**其他選項為何錯:**\n- A. Q2 是中位數,不是 IQR 法的基準。\n- B. 高於下界、低於上界 — 邏輯反了。\n- C. 2×IQR 是極端 outlier(極離群)的判準,非標準異常值。\n- D. ✓ 正解\n\n**記憶要點:** IQR 異常值 = [Q1 − 1.5·IQR, Q3 + 1.5·IQR] 之外。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q8", "topic": "Privacy", "question_text": "差分隱私(Differential Privacy)在數據應用中的目的為何?", "options": {"A": "添加隨機噪聲掩蓋個體訊息", "B": "加密所有數據", "C": "移除多數類樣本", "D": "提高數據完整性"}, "correct_answer": "A", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'A' for question 8"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 差分隱私的核心機制是「在統計結果上加入經過調校的隨機噪聲」,使任何單一個體的存在與否不顯著影響輸出,從而保護個人資訊。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 加密是其他隱私技術(如同態加密)的方法。\n- C. 與類別不平衡的取樣方法無關。\n- D. 差分隱私是用於「隱私保護」,並非提高完整性(實際上會故意降低精確度以換隱私)。\n\n**記憶要點:** Differential Privacy = 加雜訊;Homomorphic Encryption = 加密上算。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q9", "topic": "FeatureEng", "question_text": "若使用主成分分析(PCA)將資料降維至兩個主成分,這表示哪一種情況?", "options": {"A": "僅保留兩筆樣本資料進行模型訓練", "B": "將原始高維資料轉換為兩個主成分表示", "C": "每筆資料僅保留兩個原始欄位的數值", "D": "模型將限制只能用於分類任務"}, "correct_answer": "B", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'B' for question 9"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 降維至 K 個主成分指「將每筆資料投影到 K 個由原始特徵線性組合而成的新軸上」— 樣本數不變、特徵數變成 K。\n\n**其他選項為何錯:**\n- A. PCA 不改變樣本數。\n- B. ✓ 正解\n- C. 並非「保留」兩個原始欄位,而是「組合」出兩個新主成分。\n- D. PCA 後仍可用於分類、迴歸、視覺化等多種任務。\n\n**記憶要點:** PCA 把高維 → 低維新軸,新軸是原特徵的線性組合。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q10", "topic": "Stats/Descriptive", "question_text": "假設有一組成績資料呈現常態分配,平均數為 70,標準差為 10,若某位學生的成績為 90,該學生的 Z 分數約為多少?", "options": {"A": "0", "B": "1", "C": "2", "D": "3"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'C' for question 10"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** Z = (X − μ)/σ = (90 − 70)/10 = 2。\n\n**其他選項為何錯:**\n- A. Z = 0 表示恰好等於平均數。\n- B. Z = 1 對應原始值 80。\n- C. ✓ 正解\n- D. Z = 3 對應原始值 100。\n\n**記憶要點:** Z 分數計算就是套公式 (X − μ)/σ。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q11", "topic": "Privacy", "question_text": "在 AI 倫理治理的背景下,「透明性(Transparency)」通常是指什麼?", "options": {"A": "AI 系統的運算速度公開", "B": "AI 系統僅使用公開數據", "C": "AI 系統決策流程清晰且可解釋", "D": "所有 AI 模型都是開源的"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'C' for question 11"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** AI 倫理中的 Transparency 強調「決策過程可被理解、可被檢視」,包含模型行為的可解釋性(XAI)、資料來源與運算流程的揭露。\n\n**其他選項為何錯:**\n- A. 運算速度與透明性無關。\n- B. 使用公開資料不等於決策過程透明。\n- C. ✓ 正解\n- D. 開源是手段之一,但 Transparency 不要求一定開源。\n\n**記憶要點:** Transparency = 決策過程可被理解;Explainability 是其重要實作。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q12", "topic": "BigData/Processing", "question_text": "若企業希望即時監控交易異常,應選擇下列哪一類數據處理架構?", "options": {"A": "批次式資料倉儲", "B": "離線式資料湖", "C": "串流處理系統", "D": "冷資料備援架構"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'C' for question 12"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 即時偵測異常需要低延遲、事件驅動的串流處理(Stream Processing)架構,如 Kafka + Flink/Spark Streaming。\n\n**其他選項為何錯:**\n- A. 批次資料倉儲延遲高(小時/天級)。\n- B. 離線資料湖偏儲存,不直接做即時運算。\n- C. ✓ 正解\n- D. 冷資料備援為長期保存用途。\n\n**記憶要點:** 即時 → Stream Processing;批次 → Batch / Warehouse。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q13", "topic": "Analytics/Methods", "question_text": "為了分析社群網路使用者之間的互動結構,應使用下列哪種分析方法?", "options": {"A": "文字探勘", "B": "主成分分析", "C": "圖論分析", "D": "分群分析"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 6, "evidence": "answer column shows 'C' for question 13"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 社群網路的人際互動本質上是圖結構(節點=人,邊=互動),適合以圖論分析(Graph Analysis、Centrality、Community Detection 等)切入。\n\n**其他選項為何錯:**\n- A. 文字探勘針對的是文本內容。\n- B. PCA 是降維方法。\n- C. ✓ 正解\n- D. 分群分析可作補充,但無法直接表達互動關係。\n\n**記憶要點:** 社群互動結構 → 圖(Graph)+ 圖論演算法。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q14", "topic": "ML/Basics", "question_text": "為了加速大數據環境下的 AI 模型訓練,以下哪一項為常見技術?", "options": {"A": "早期停止(Early Stopping)", "B": "批次分群(Mini-batching)", "C": "混合精度訓練(Mixed Precision Training)", "D": "主成分分析(PCA)"}, "correct_answer": "C", "source": {"file": "shared/sample-questions.pdf", "page": 7, "evidence": "answer column shows 'C' for question 14"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 混合精度訓練(FP16 + FP32)能顯著加速 GPU/TPU 上的訓練速度並減少記憶體用量,是大規模深度學習的標準加速技術。\n\n**其他選項為何錯:**\n- A. Early Stopping 是防止過擬合,不是加速運算本身。\n- B. Mini-batching 是訓練的基本方式而非「加速技術」(此選項中文翻譯也不準確,應是 mini-batch 不是分群)。\n- C. ✓ 正解\n- D. PCA 是特徵降維,主要目的不是訓練加速。\n\n**記憶要點:** Mixed Precision = FP16+FP32 混用,GPU 加速大殺器。", "subject_code": "s2"}, {"id": "sample-s2-114-09-q15", "topic": "ML/Basics", "question_text": "[此題包含附圖:CIFAR-10 程式碼,x_train.shape = (50000, 32, 32, 3),x_test.shape = (10000, 32, 32, 3),x_train.min()=0,x_train.max()=255] 考慮使用 CIFAR-10 資料集進行資料處理,資料包括 32×32 像素的多筆彩色照片。下列程式碼的資料處理,請選出正確的選項。", "options": {"A": "訓練集(x_train)資料集個數為 100000 筆", "B": "測試集(x_test)資料集個數為 10000 筆", "C": "訓練集(x_train)是 Pandas 資料框(DataFrame)物件", "D": "如果希望將訓練集(x_train)像素值轉換為 [0, 1] 的範圍,則可以輸入:x_train = x_train.astype('int32') / 255.0"}, "correct_answer": "B", "source": {"file": "shared/sample-questions.pdf", "page": 7, "evidence": "answer column shows 'B' for question 15"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 由 shape 資訊 (10000, 32, 32, 3) 可知測試集確實有 10,000 筆 32×32 彩色影像。\n\n**其他選項為何錯:**\n- A. 訓練集為 50,000 筆 (shape 第一維是 50000),非 100,000。\n- B. ✓ 正解\n- C. 由 `type(x_train)` 顯示為 `numpy.ndarray`,並非 Pandas DataFrame。\n- D. 想得到 [0,1] 浮點區間,應該轉為 `float32` 後再除以 255.0;轉成 `int32` 後除法會因為整數除法或精度問題出錯。\n\n**記憶要點:** 影像 normalize 通常 `astype('float32') / 255.0`。", "subject_code": "s2"}, {"id": "exam-s3-114-2-q1", "topic": "Training/Validation", "question_text": "某零售企業建立一個銷售預測模型,希望評估該模型在不同月份的新資料上,是否仍能維持穩定的預測表現。資料科學團隊計畫利用統計方法檢驗模型對未觀察資料的適應能力與泛化效果。下列哪一種方法最適合用於此目的?", "options": {"A": "F 檢定(F-test)", "B": "交叉驗證(Cross-Validation)", "C": "配對樣本 t 檢定(Paired-sample t-test)", "D": "卡方檢定(Chi-square Test)"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 1, "evidence": "answer column shows 'B' for question 1"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 交叉驗證(K-fold、Time-series CV 等)是評估模型對「未見資料」泛化能力的標準做法,藉由多次劃分訓練/驗證集獲得穩定的效能估計。\n\n**其他選項為何錯:**\n- A. F 檢定是檢驗多組平均數差異或變異數比較。\n- B. ✓ 正解\n- C. 配對 t 檢定比較兩組相依樣本的平均差,非泛化評估方法。\n- D. 卡方檢定處理類別變數獨立性。\n\n**記憶要點:** 泛化能力評估 → Cross-Validation。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q2", "topic": "DL/Optimization", "question_text": "在建立迴歸或分類模型時,若希望避免模型過度擬合(Overfitting),可透過加入正則化項以限制模型的複雜度。其中,L1 正則化(Lasso)的主要效果為何?", "options": {"A": "增加模型參數的數量,以提升表現靈活度", "B": "強化梯度穩定性,避免參數更新過度震盪", "C": "產生稀疏模型(Sparse Model),使部分參數權重收斂為零", "D": "提高學習率(Learning Rate),加速模型收斂速度"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 1, "evidence": "answer column shows 'C' for question 2"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** L1 正則化在損失函數中加入 |w| 之和,其幾何上的菱形約束容易把部分權重恰好壓至 0,產生稀疏解,具備特徵選擇效果。\n\n**其他選項為何錯:**\n- A. 正則化是「抑制」複雜度,不是增加參數。\n- B. 那較接近 batch normalization 或梯度裁剪的功能。\n- C. ✓ 正解\n- D. 學習率調整不是正則化作用。\n\n**記憶要點:** L1 = Lasso = 稀疏化(部分權重歸零);L2 = Ridge = 平滑縮小。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q3", "topic": "Math/Optimization", "question_text": "在訓練非線性模型時,若目標函數為非凸函數(Non-convex Function),演算法在參數更新過程中可能出現多個極值點,導致最佳化結果不穩定。請問此時最可能發生下列哪一種情況?", "options": {"A": "梯度消失", "B": "資料過少", "C": "局部最優解", "D": "過擬合"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 1, "evidence": "answer column shows 'C' for question 3"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 非凸函數有多個局部極小值,梯度下降可能停在局部最優而非全域最優,造成最佳化結果不穩定。\n\n**其他選項為何錯:**\n- A. 梯度消失是激活函數飽和導致的問題,與凸性無關。\n- B. 資料量問題與最佳化幾何性無關。\n- C. ✓ 正解\n- D. 過擬合是泛化問題,不是「最佳化卡住」的問題。\n\n**記憶要點:** 非凸 → 容易陷入局部最優;改善方法:多次重啟、Momentum、Adam、學習率排程。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q4", "topic": "ML/Algorithms", "question_text": "在執行 DBSCAN(Density-Based Spatial Clustering of Applications with Noise)群集分析時,若某資料點鄰域內的樣本數不足以形成核心點(Core Point),且該點未被任何核心點的鄰域所包含,也未與其他群形成密度可達關係(Density Reachability),此資料點最終將被歸類為哪一種類型?", "options": {"A": "鄰近點(Neighbor Point)", "B": "雜訊點(Noise Point)", "C": "邊界點(Border Point)", "D": "潛在點(Potential Point)"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 1, "evidence": "answer column shows 'B' for question 4"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** DBSCAN 中,既不是 Core Point 也不在任何 Core Point 鄰域內的點,被判定為 Noise Point(雜訊點)。\n\n**其他選項為何錯:**\n- A. 「鄰近點」非 DBSCAN 標準術語。\n- B. ✓ 正解\n- C. Border Point 是「不是 core,但落在 core 的 ε 鄰域內」— 題目明確排除這種情況。\n- D. 「潛在點」非 DBSCAN 標準術語。\n\n**記憶要點:** DBSCAN 三類點:Core / Border / Noise。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q5", "topic": "DL/CNN", "question_text": "某智慧製造公司開發一套影像辨識系統,用於自動檢測生產線上的瑕疵產品。系統採用卷積神經網路(Convolutional Neural Network, CNN)作為主要模型架構,其中第一層卷積層(Convolutional Layer)主要負責的功能為下列何者?", "options": {"A": "自動提取輸入影像中的局部特徵", "B": "降低影像維度以加速運算效率", "C": "增加神經元與參數數量以提升模型容量", "D": "整合所有特徵並輸出最終分類結果"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 1, "evidence": "answer column shows 'A' for question 5"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** CNN 第一層卷積層通常以小卷積核掃描影像,自動抽取「邊緣、紋理、角點」等低階局部特徵;隨網路加深,特徵會逐步抽象化。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 降維是池化層(Pooling)的工作。\n- C. 與卷積層特定功能無關。\n- D. 分類是最末端的全連接層/softmax。\n\n**記憶要點:** Conv 抽特徵;Pool 降維;FC 分類。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q6", "topic": "DL/CNN", "question_text": "某智慧城市團隊開發一套交通監控系統,用於即時辨識路口監視器影像中的車輛與行人。團隊比較後發現,卷積神經網路(Convolutional Neural Network, CNN)在訓練與推論效率上,明顯優於傳統的全連接神經網路(Fully Connected Neural Network, FCNN)。請問下列何者為主要原因?", "options": {"A": "CNN 能自動學習影像的旋轉與比例不變性", "B": "CNN 可直接跳過人工特徵提取步驟進行分類", "C": "CNN 透過區域感知(Local Receptive Field)與參數共享(Parameter Sharing)機制,降低模型參數量與運算複雜度", "D": "CNN 捨棄激勵函數(Activation Function),以加快運算速度"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 2, "evidence": "answer column shows 'C' for question 6"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** CNN 相對 FCNN 的核心優勢:每個神經元只看局部區域(Local Receptive Field)且卷積核權重共享(Parameter Sharing),大幅減少參數數量與運算量。\n\n**其他選項為何錯:**\n- A. CNN 不天生具有完全的旋轉/比例不變性,需依賴資料增強。\n- B. FCNN 也不需要人工特徵提取,這不是 CNN 獨有優勢。\n- C. ✓ 正解\n- D. CNN 仍使用激活函數(如 ReLU)。\n\n**記憶要點:** CNN 核心:Local Receptive Field + Parameter Sharing → 少參數、可擴規模。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q7", "topic": "DL/RNN", "question_text": "下列哪一種應用最適合採用長短期記憶網路(Long Short-Term Memory, LSTM)模型?", "options": {"A": "預測未來七天的電力需求變化趨勢", "B": "辨識監視影像中不同類別的物件", "C": "將大量顧客資料依相似特徵自動分群", "D": "將高維度的感測器資料壓縮成低維表示"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 2, "evidence": "answer column shows 'A' for question 7"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** LSTM 設計用來處理「序列、時間相依」資料的長期依賴問題,電力需求預測屬於典型的時間序列任務。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 物件辨識用 CNN 系列(YOLO、Faster R-CNN)。\n- C. 自動分群用 K-means、DBSCAN 等。\n- D. 降維用 PCA、Autoencoder。\n\n**記憶要點:** 序列/時間相依 → LSTM/GRU/Transformer。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q8", "topic": "ML/Algorithms", "question_text": "資訊增益(Information Gain)常用於衡量特徵對分類結果的不確定性貢獻程度,並據以進行特徵選擇。此方法主要應用於下列哪一類模型架構中?", "options": {"A": "使用 L1 正則化進行特徵篩選的線性模型", "B": "利用激活函數(Activation Function)進行特徵擷取的深度神經網路", "C": "透過核函數(Kernel Function)將特徵映射至高維空間的分類模型", "D": "透過遞迴分裂方式建立分類規則的決策樹模型"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 2, "evidence": "answer column shows 'D' for question 8"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** Information Gain(及其延伸 IG Ratio、Gini)是決策樹(ID3、C4.5)選擇分裂屬性的標準,衡量該屬性對減少資訊熵的貢獻。\n\n**其他選項為何錯:**\n- A. L1 正則化是另一種特徵選擇機制,但其本身不基於資訊增益。\n- B. 深度網路不使用資訊增益做特徵擷取。\n- C. 核方法(SVM)依賴核函數,非資訊增益。\n- D. ✓ 正解\n\n**記憶要點:** Information Gain 是決策樹的核心分裂準則。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q9", "topic": "Feature/Engineering", "question_text": "在建構以距離為基礎的機器學習模型(如 KNN、SVM)時,下列哪一項資料前處理方式最為關鍵?", "options": {"A": "進行特徵縮放(Feature Scaling),使各特徵變數具有相似的數值範圍", "B": "將連續型特徵變數轉換為類別型變數", "C": "以平均值或中位數進行缺失值補齊", "D": "進行隨機抽樣以平衡資料筆數"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 2, "evidence": "answer column shows 'A' for question 9"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** KNN、SVM(以及 K-means、PCA 等)的距離度量會被特徵尺度大幅影響;不縮放會讓量級大的特徵主導距離,導致模型失真。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 連續轉類別會喪失精細資訊。\n- C. 缺值補齊雖重要,但不是「距離型模型」特有最關鍵步驟。\n- D. 抽樣與距離模型本身關鍵性無關。\n\n**記憶要點:** 距離 / 內積為基礎的模型 → 一定先做 Feature Scaling。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q10", "topic": "Training/Tuning", "question_text": "下列哪一種應用情境最適合導入 AutoML,以提升模型開發效率?", "options": {"A": "公司已有完整的 MLOps 平台與資深資料科學團隊,模型更新採固定流程", "B": "製造部門的生產良率模型已長期穩定運作,只需定期調整參數", "C": "行銷部門希望在短時間內比較多種顧客流失預測模型,缺乏專職工程師與時間進行手動建模", "D": "財務部門正在開發高度客製化的信用風險評估模型,需要精細控制特徵工程與演算法細節"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 3, "evidence": "answer column shows 'C' for question 10"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** AutoML 的價值在於「自動化模型挑選與超參數搜尋」,最適用於團隊缺乏 ML 專家、需要快速嘗試多種模型的場景。\n\n**其他選項為何錯:**\n- A. 已有資深團隊與固定流程,AutoML 邊際效益小。\n- B. 已長期穩定,只需微調,不需 AutoML。\n- C. ✓ 正解\n- D. 高度客製需要細部控制,AutoML 反而限制了靈活性。\n\n**記憶要點:** AutoML 適合:時間緊、人力不足、需要嘗試多模型的中度標準化任務。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q11", "topic": "Training/Tuning", "question_text": "相較於 Grid Search,Random Search 在超參數調整上具備哪一項主要優勢?", "options": {"A": "可自動產生模型架構", "B": "可使用更大的訓練集", "C": "避免模型過擬合", "D": "能更有效率搜尋高維參數空間"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 3, "evidence": "answer column shows 'D' for question 11"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** Bergstra & Bengio 證明,在高維超參數空間中,Random Search 比 Grid Search 用相同預算可以更廣泛地探索重要維度(因為 Grid 受維度詛咒影響嚴重)。\n\n**其他選項為何錯:**\n- A. 模型架構自動產生屬於 NAS / AutoML。\n- B. 與資料量無關。\n- C. 兩者都不直接防止過擬合。\n- D. ✓ 正解\n\n**記憶要點:** 高維調參 → Random Search 通常比 Grid Search 高效。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q12", "topic": "Math/Optimization", "question_text": "某智慧製造公司開發一套設備故障預測系統,利用感測器資料訓練深度神經網路(Deep Neural Network, DNN)模型,以提前偵測異常運轉跡象。在訓練過程中,團隊發現模型收斂速度不穩定:有時太快導致過擬合,有時又遲遲無法達到最佳準確率。開發團隊可以藉由調整下列哪一項超參數(Hyperparameter)以改善此問題?", "options": {"A": "每個神經元的輸出結果", "B": "損失函數(Loss Function)在訓練過程中的梯度變化值(Gradient)", "C": "學習率(Learning Rate),控制模型權重更新的速度", "D": "模型在訓練後產生的權重值"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 3, "evidence": "answer column shows 'C' for question 12"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 學習率是控制權重每次更新步幅的「超參數」,過大會震盪/過擬合,過小會收斂緩慢 — 正符合題目描述,可透過調整 LR 或使用 LR Scheduler 改善。\n\n**其他選項為何錯:**\n- A. 神經元輸出是訓練過程的「結果」,不是調控的超參數。\n- B. 梯度值是訓練計算出的中間量,不是超參數。\n- C. ✓ 正解\n- D. 訓練後的權重是輸出,不是調的對象。\n\n**記憶要點:** 收斂震盪 / 過快 → 調 Learning Rate(超參數)。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q13", "topic": "Bias/Fairness", "question_text": "標籤偏差(Label Bias)通常是因為什麼原因造成?", "options": {"A": "訓練資料量過大", "B": "標記資料本身帶有主觀偏見", "C": "模型結構設計不當", "D": "特徵數量設定過多"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 3, "evidence": "answer column shows 'B' for question 13"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** Label Bias 指人工標註過程中,標記者的主觀傾向、文化背景或標註指南偏差,使標籤本身不客觀(如種族、性別偏見內化進標籤)。\n\n**其他選項為何錯:**\n- A. 資料量大小不直接造成標籤偏差。\n- B. ✓ 正解\n- C. 模型結構導致的是 inductive bias,不是 label bias。\n- D. 特徵數量是特徵問題,非標籤。\n\n**記憶要點:** Label Bias = 標註者的主觀偏見內化進資料。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q14", "topic": "Privacy/Compliance", "question_text": "下列哪一種 AI 應用情境中,模型的可解釋性(Explainability)最為關鍵?", "options": {"A": "電商平台利用深度學習模型預測用戶的下一次購買時間,以優化推播行銷策略", "B": "新創公司使用機器學習演算法自動調整廣告出價策略,以提升點擊轉換率", "C": "醫院導入 AI 模型分析病患影像並給出腫瘤惡性可能性,作為臨床醫師診斷依據", "D": "銀行導入 AI 模型預測客戶流失率,並自動推薦留客優惠方案"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 3, "evidence": "answer column shows 'C' for question 14"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 醫療診斷直接影響生命健康,醫師需要理解模型輸出根據才能負責任地下判斷,且受法規與倫理高度監督,Explainability 最為關鍵。\n\n**其他選項為何錯:**\n- A. 商業預測,風險較低。\n- B. 廣告出價,商業範疇。\n- C. ✓ 正解\n- D. 信用 / 行銷類,雖重要但風險與責任不及醫療。\n\n**記憶要點:** 高風險決策(醫療、司法、金融授信)→ 可解釋性最重要。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q15", "topic": "Eval/Metrics", "question_text": "在線性迴歸模型中,若 R² 值為 0.85,其意義為何?", "options": {"A": "模型準確率為 85%", "B": "85% 的變異可被模型解釋", "C": "預測誤差為 15%", "D": "模型有 85% 的信心水準"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 4, "evidence": "answer column shows 'B' for question 15"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** R²(決定係數)= 1 − SSE/SST,代表模型解釋了多少比例的因變數變異;R²=0.85 表示 85% 的 Y 變異被自變數解釋。\n\n**其他選項為何錯:**\n- A. R² 不是分類「準確率」。\n- B. ✓ 正解\n- C. 1 − R² 是未解釋的變異比例,非「誤差率」。\n- D. 信心水準是信賴區間的概念,與 R² 無關。\n\n**記憶要點:** R² = 解釋變異比例;不是準確率、不是信心水準。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q16", "topic": "Eval/Metrics", "question_text": "在二元分類問題中,若精確率(Precision)為 0.8,召回率(Recall)為 0.6,則 F1 分數(F1 Score)為何?", "options": {"A": "0.686", "B": "0.700", "C": "0.720", "D": "0.750"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 4, "evidence": "answer column shows 'A' for question 16"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** F1 = 2·P·R/(P+R) = 2·0.8·0.6/(0.8+0.6) = 0.96/1.4 ≈ 0.6857 ≈ 0.686。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 0.7 是算術平均 (0.8+0.6)/2,非調和平均。\n- C. 此值無對應計算。\n- D. 此值無對應計算。\n\n**記憶要點:** F1 = Precision 與 Recall 的調和平均;偏向較小者。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q17", "topic": "DL/Optimization", "question_text": "下列哪一種優化演算法內建動量(Momentum)的設計機制?", "options": {"A": "SGD+Momentum", "B": "Adam", "C": "RMSProp", "D": "Adagrad"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 4, "evidence": "answer column shows 'B' for question 17"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** Adam = Momentum + RMSProp,自帶一階動量(梯度的指數移動平均)與二階動量(梯度平方的指數移動平均)。題目問「內建」動量,Adam 是最完整代表。\n\n**其他選項為何錯:**\n- A. SGD+Momentum 是「外加」動量的變形,需顯式啟用;且選項本身名稱已帶 Momentum,不算「內建」。\n- B. ✓ 正解\n- C. RMSProp 只有二階動量(歷史梯度平方),沒有一階動量。\n- D. Adagrad 累積歷史梯度平方,沒有一階動量。\n\n**記憶要點:** Adam = Adaptive Moment Estimation,一二階動量都內建。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q18", "topic": "ML/Algorithms", "question_text": "下列何者最能同時反映 XGBoost(eXtreme Gradient Boosting)相較於傳統梯度提升決策樹(Gradient Boosting Decision Tree, GBDT)的主要技術改進?", "options": {"A": "引入正則化項(Regularization)以抑制過擬合,並支援缺失值自動處理與並行化訓練", "B": "改以隨機森林(Random Forest)架構取代樹模型以提升準確率", "C": "以類神經網路(Neural Network)取代弱分類器(Weak Learners)", "D": "採用批次正規化(Batch Normalization)技術提升模型穩定性"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 4, "evidence": "answer column shows 'A' for question 18"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** XGBoost 相對 GBDT 的主要創新:在目標函數中加入 L1/L2 正則化、稀疏感知(自動處理缺失值)、並行化分裂節點搜尋、近似分裂演算法等,使模型既精準又能 scale。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. XGBoost 不是改用 Random Forest,仍是 Boosting。\n- C. 弱分類器仍是樹,不是神經網路。\n- D. Batch Norm 屬於深度學習領域,與 XGBoost 無關。\n\n**記憶要點:** XGBoost 賣點:Regularization + Sparsity-aware + Parallel split finding。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q19", "topic": "Eval/Metrics", "question_text": "某醫療機構開發疾病早期偵測模型,正樣本(確診病例)僅佔 3%。在模型訓練與評估過程中,下列哪一種作法最不適合用於提升對少數類病例的預測能力?", "options": {"A": "使用 SMOTE 過採樣", "B": "調整類別權重", "C": "使用準確率(Accuracy)作為評估指標", "D": "欠採樣多數類(Undersampling the majority class)"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 4, "evidence": "answer column shows 'C' for question 19"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 類別嚴重不平衡時,Accuracy 容易被多數類主導(全猜正常仍 97% 對),無法反映模型對少數類的偵測能力;應改用 Precision/Recall/F1/AUC 等。\n\n**其他選項為何錯:**\n- A. SMOTE 對少數類採樣有幫助。\n- B. 調整 class weight 能讓損失更重視少數類。\n- C. ✓ 正解(這是「最不適合」的選項)\n- D. 欠採樣多數類能平衡資料。\n\n**記憶要點:** 不平衡資料 → 改用 Precision/Recall/F1/AUC,而非 Accuracy。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q20", "topic": "Feature/Engineering", "question_text": "某電子商務公司為開發商品評論情感分析模型,希望模型能捕捉評論中不同特徵之間的關聯影響,例如「商品價格」與「顧客滿意度」的互動效果。下列哪一種特徵工程設計方式最適合用於建立互動特徵(Interaction Features)?", "options": {"A": "將單一特徵取平方", "B": "對所有特徵進行對數轉換", "C": "將兩個或多個特徵進行乘積或交互組合", "D": "對特徵進行標準化"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 5, "evidence": "answer column shows 'C' for question 20"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 互動特徵的標準做法是把兩個(或多個)特徵相乘 / 相除 / 組合(如 x1·x2),使線性模型也能捕捉非線性互動效應。\n\n**其他選項為何錯:**\n- A. 取平方是單一特徵的非線性轉換,不涉及多特徵互動。\n- B. 對數轉換改變單一特徵分佈,非互動。\n- C. ✓ 正解\n- D. 標準化只是縮放,不是建構互動。\n\n**記憶要點:** Interaction Feature = 多特徵的乘積/交互組合。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q21", "topic": "DL/Transformer", "question_text": "某語音辨識系統開發團隊採用 Transformer 架構,為了讓模型能同時理解語音片段中的發音特徵、語速變化與語意脈絡等多層次資訊,團隊在設計中導入了多頭注意力(Multi-head Attention)機制。請問下列何者為此機制的主要優點?", "options": {"A": "減少模型參數量以降低訓練成本", "B": "加速整體注意力計算過程", "C": "從不同表示子空間(Representation Subspaces)同時捕捉多樣化關聯資訊", "D": "避免梯度消失(Gradient Vanishing)問題"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 5, "evidence": "answer column shows 'C' for question 21"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 多頭注意力把 Q、K、V 投影到多個子空間中平行計算 attention,讓模型能同時關注不同類型的關係(如語法、語義、長距離依賴等)。\n\n**其他選項為何錯:**\n- A. 多頭反而會增加參數量。\n- B. 多頭並未加速,而是擴增表達能力。\n- C. ✓ 正解\n- D. 梯度消失主要靠殘差連接(Residual)解決,不是多頭注意力。\n\n**記憶要點:** Multi-head = 多個 attention 並行 + 不同 representation subspace。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q22", "topic": "Math/Probability", "question_text": "某電商平台希望預測顧客是否會購買特定商品。系統蒐集顧客的瀏覽紀錄、停留時間、商品類別偏好與過去購買行為,並以此推估「在觀察到這些行為特徵的情況下,該顧客會購買的機率」。若模型採用貝氏定理(Bayes' Theorem)進行推論,下列敘述何者最符合其核心運作機制?", "options": {"A": "根據歷史樣本自動分群,找出行為相似的顧客群", "B": "以條件機率方式計算顧客屬於「會購買」或「不會購買」的分類機率", "C": "以最小平方誤差(Mean Squared Error)為損失函數,預測顧客的購買金額", "D": "依據回饋信號(Feedback Signal)透過強化學習(Reinforcement Learning)動態調整推薦策略"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 5, "evidence": "answer column shows 'B' for question 22"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 貝氏分類器以條件機率 P(類別 | 特徵) ∝ P(特徵 | 類別)·P(類別) 計算每個類別的後驗機率,正符合題述機制。\n\n**其他選項為何錯:**\n- A. 自動分群是非監督學習(K-means)。\n- B. ✓ 正解\n- C. MSE 損失搭配連續輸出,屬於迴歸,不是貝氏推論。\n- D. 強化學習屬於另一典範,非貝氏推論。\n\n**記憶要點:** Bayes 分類 = 計算每類條件機率,取最大者。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q23", "topic": "Math/Probability", "question_text": "一家再生能源公司希望預測未來三個月太陽能發電量的波動範圍。由於氣候條件具有高度隨機性,且輸入變數(如日照時數、雲量、溫度)之間存在不確定關係,工程團隊決定以隨機抽樣方式模擬多種可能情境,以估算整體發電量的機率分佈與風險區間。請問此時所採用的技術最符合下列哪一種方法?", "options": {"A": "蒙地卡羅方法(Monte Carlo Method)", "B": "K-means 聚類(K-means Clustering)", "C": "支持向量迴歸(Support Vector Regression, SVR)", "D": "特徵選取(Feature Selection)"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 5, "evidence": "answer column shows 'A' for question 23"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** Monte Carlo 法透過大量隨機抽樣模擬輸入變數的不確定性,可估計目標量的分佈與風險區間,正適合題述場景。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. K-means 是分群,非情境模擬。\n- C. SVR 是迴歸模型,給出點預測而非機率分佈。\n- D. 特徵選取是前處理,不是模擬技術。\n\n**記憶要點:** 不確定情境模擬 + 機率分佈估計 → Monte Carlo。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q24", "topic": "Eval/Bias", "question_text": "某房地產公司利用多元迴歸模型(Multiple Regression Model)預測房價,並繪製殘差圖(Residual Plot)檢查模型品質。結果顯示部分資料點的殘差極大,且在高價區樣本中出現系統性彎曲分佈現象。根據此觀察,下列何者為最可能的正確解釋?", "options": {"A": "模型過度擬合(Overfitting),導致在訓練資料上表現過好、泛化能力不足", "B": "模型特徵數量不足,導致欠擬合(Underfitting)", "C": "模型存在異常值(Outlier)或非線性關係,違反迴歸假設", "D": "殘差圖呈現隨機分佈,表示模型已完全符合所有假設"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 6, "evidence": "answer column shows 'C' for question 24"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 殘差圖出現「系統性彎曲」表示存在未被線性模型捕捉的非線性結構;極大殘差則暗示 outlier。兩者都違反線性迴歸的線性假設與常態誤差假設。\n\n**其他選項為何錯:**\n- A. 過擬合主要在訓練/驗證集表現差異上看,不直接由殘差彎曲判斷。\n- B. 欠擬合可能讓殘差有趨勢,但「殘差極大 + 高價區系統彎曲」更直接指向 outlier + 非線性。\n- C. ✓ 正解\n- D. 隨機分佈才表示假設成立;題目描述明確是系統性彎曲。\n\n**記憶要點:** 殘差圖看不到隨機分佈 → 模型假設失效;彎曲 = 非線性。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q25", "topic": "ML/Algorithms", "question_text": "某金融機構正在建立傳統信用評分卡模型,採用邏輯迴歸(Logistic Regression)作為建模方法,並依循監理機關建議的標準化流程進行模型開發。下列哪一項不是傳統信用評分卡模型開發流程中的常見步驟?", "options": {"A": "使用生成式模型進行特徵學習", "B": "進行特徵選擇與多重共線性(Multicollinearity)分析", "C": "進行分箱(Binning)與資訊值(Information Value, IV)檢定", "D": "使用樣本穩定性指標(Population Stability Index, PSI)檢驗模型穩定性"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 6, "evidence": "answer column shows 'A' for question 25"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 傳統信用評分卡強調簡單可解釋、可審計,標準流程包含分箱、IV、WOE、邏輯迴歸、PSI 等;「生成式模型做特徵學習」不屬於傳統流程,也較難通過監理稽核。\n\n**其他選項為何錯:**\n- A. ✓ 正解(這是「不是」的選項)\n- B. 特徵選擇 + 共線性檢查是標準步驟。\n- C. Binning + IV 是評分卡核心做法。\n- D. PSI 是部署後監控的標準指標。\n\n**記憶要點:** 傳統評分卡標配:Binning + WOE + IV + Logistic Regression + PSI。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q26", "topic": "Modeling/Selection", "question_text": "在防止監督式學習模型過擬合(Overfitting)時,下列哪一種策略不屬於降低模型複雜度或限制學習能力的作法?", "options": {"A": "採用 L1 或 L2 正則化", "B": "在訓練過程中使用 Dropout 技術", "C": "採取早期停止(Early Stopping)機制", "D": "擴增輸入特徵變數以提升模型表達能力"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 6, "evidence": "answer column shows 'D' for question 26"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 增加特徵會「提高」模型容量,反而更容易過擬合;這正與防止過擬合相反。\n\n**其他選項為何錯:**\n- A. L1/L2 正則化是經典的複雜度懲罰。\n- B. Dropout 隨機關閉神經元,限制學習能力。\n- C. Early Stopping 在驗證損失上升時停訓,避免過度配適。\n- D. ✓ 正解(這是「不屬於」的選項)\n\n**記憶要點:** 防止過擬合的常見手段:L1/L2、Dropout、Early Stopping、減少特徵 / 模型容量。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q27", "topic": "DL/Basics", "question_text": "某智慧製造團隊在開發瑕疵影像檢測模型時,發現使用線性激活函數(Activation Function)後,模型的訓練準確率長期停滯,懷疑模型無法學習到足夠複雜的特徵表達。若要改善此問題,下列哪一項調整方案最為合適?", "options": {"A": "增加卷積層(Convolutional Layer)數量,使網路更深以強化特徵提取", "B": "將輸入影像先進行灰階化處理,降低運算量", "C": "使用 Sigmoid 激活函數,以將輸出壓縮至 [0,1] 範圍", "D": "改用 ReLU(Rectified Linear Unit)激活函數,以引入非線性並提升模型表達能力"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 6, "evidence": "answer column shows 'D' for question 27"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 線性激活的多層網路在數學上等同於單一線性轉換,無法學習非線性特徵;改用 ReLU(或其他非線性激活)即可賦予網路非線性表達能力,且 ReLU 計算高效、緩解梯度消失。\n\n**其他選項為何錯:**\n- A. 多堆線性層仍是線性,深度無助。\n- B. 灰階化降運算但不解決非線性表達問題。\n- C. Sigmoid 雖非線性,但深網中易梯度消失,且通常不用於隱藏層;不是最佳選擇。\n- D. ✓ 正解\n\n**記憶要點:** 深網要有非線性才能擬合複雜函數;隱藏層首選 ReLU。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q28", "topic": "Eval/Bias", "question_text": "一家零售電商公司希望建立顧客流失預測模型,用以判斷哪些會員可能在三個月內不再消費。團隊以去年會員資料進行訓練,並採用「曾經購買三次以上」的活躍顧客紀錄作為樣本。模型上線後,對整體會員進行預測時,發現模型對於新註冊會員與低消費會員的預測準確率明顯偏低。下列何者為造成此現象最可能的原因?", "options": {"A": "特徵設計未排除與會員忠誠度高度相關的變數,導致特徵偏差(Feature Bias)", "B": "標記(Label)由人工標註,導致標籤偏差(Label Bias)", "C": "訓練樣本僅涵蓋高活躍顧客,造成取樣偏差(Sampling Bias)", "D": "模型未進行超參數調整,導致過擬合(Overfitting)"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 7, "evidence": "answer column shows 'C' for question 28"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 訓練資料只取「曾購買三次以上」這群高活躍顧客,部署時遇到新註冊或低消費會員(分佈不同),模型自然表現差 — 這是典型 Sampling Bias / Selection Bias。\n\n**其他選項為何錯:**\n- A. 特徵偏差描述的是特徵設計問題,題目核心是樣本取得方式。\n- B. 沒提到人工標註,且流失與否的標籤通常是事實。\n- C. ✓ 正解\n- D. 過擬合是訓練/驗證表現差,題目強調的是分佈差異。\n\n**記憶要點:** 訓練取樣只涵蓋特定群體 → Sampling Bias / Selection Bias。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q29", "topic": "Training/Validation", "question_text": "在工業設備故障預測專案中,模型訓練與超參數調整均依賴於一段歷史數據作為驗證集。然而,隨著設備運行環境與工況條件的變化,原有驗證集已無法充分反映現況,導致模型在實際部署後的預測準確率逐漸下降。下列哪一種策略最能有效提升模型在長期運行環境中的穩定性與泛化能力?", "options": {"A": "固定驗證集內容,並透過模型正則化技巧(如 L2 正則化)強化模型泛化", "B": "將全部歷史資料納入訓練,不使用驗證集,依靠早期停止(Early Stopping)控制訓練", "C": "簡化模型架構,減少模型參數數量以降低過擬合風險", "D": "採用時間序列交叉驗證(Time Series Cross Validation)或滑動視窗驗證(Rolling Window Validation)方法,動態更新驗證資料以適應時間演進"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 7, "evidence": "answer column shows 'D' for question 29"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 時間序列 CV / Rolling Window 能讓驗證集隨時間滾動,反映最新分佈,有效應對 Concept Drift,符合長期運行需求。\n\n**其他選項為何錯:**\n- A. 固定驗證集無法追上分佈演變。\n- B. 沒驗證集 + 只靠 Early Stopping 仍無法應對 drift。\n- C. 簡化模型不解決時間漂移。\n- D. ✓ 正解\n\n**記憶要點:** 概念漂移(Concept Drift)+ 時間序列 → Time Series CV / Rolling Window。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q30", "topic": "Eval/Metrics", "question_text": "某情感分析模型在英文資料集上取得 macro F1-score = 0.91。當該模型部署至西班牙文資料集時,F1-score 驟降至 0.58。下列哪一項解釋最合理,且與 F1-score 變化相關?", "options": {"A": "macro F1-score 本身波動性高,建議改用 micro-average F1-score 評估", "B": "模型在西班牙文語料上過度擬合,導致評估結果偏高", "C": "語言轉移造成召回率(Recall)下降,模型無法正確辨識關鍵情緒詞彙", "D": "以均方誤差(MSE)取代 F1-score 評估可獲得更準確的結果"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 7, "evidence": "answer column shows 'C' for question 30"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 跨語言轉移(English → Spanish)時,模型對新語言的情緒詞彙覆蓋不足,導致 Recall 下降;F1 = 2PR/(P+R) 對 Recall 變化敏感,自然驟降。\n\n**其他選項為何錯:**\n- A. macro vs micro 並非分數驟降的根本原因。\n- B. 過擬合會使表現偏好,但驟降不是過擬合的表現。\n- C. ✓ 正解\n- D. MSE 是迴歸指標,不適用分類。\n\n**記憶要點:** 跨域 / 跨語言 → Recall 通常先掉 → F1 隨之大降。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q31", "topic": "Modeling/Selection", "question_text": "某能源公司利用歷史氣象與用電資料,開發長期電力需求預測模型,採用深度神經網路架構進行訓練。在訓練過程中,模型在訓練集上的損失值持續下降,但在驗證集上,損失在第 80 輪後開始波動,呈現週期性上升與下降。團隊懷疑模型受到季節性資料波動與隨機噪音影響,導致驗證損失難以穩定收斂。若要在此情境下合理運用早期停止法(Early Stopping)以確保模型具最佳泛化能力,下列哪一項策略最為適當?", "options": {"A": "直接根據訓練集損失最低點停止訓練,以確保模型充分擬合所有樣本", "B": "監控驗證集損失並設定適度的耐心值(Patience),在連續多輪未改善後再停止訓練", "C": "改以測試集損失作為早停依據,以提升模型最終評估一致性", "D": "將所有資料重新合併後訓練至收斂,避免因資料分割導致評估波動"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 7, "evidence": "answer column shows 'B' for question 31"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 標準 Early Stopping 流程:監控「驗證集」損失,設定 patience(如 10 epochs)避免短期震盪誤判停止;這正好應對題述驗證損失波動的情況。\n\n**其他選項為何錯:**\n- A. 訓練損失持續下降是過擬合徵兆,不能作為停止依據。\n- B. ✓ 正解\n- C. 測試集只能用於最終評估,不能參與訓練決策,否則造成資訊洩漏。\n- D. 合併資料無法評估泛化能力。\n\n**記憶要點:** Early Stopping = 監控 Validation Loss + Patience。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q32", "topic": "Feature/Selection", "question_text": "某電信公司開發客戶流失預測模型,使用大量顧客行為特徵,例如通話時長、上網頻率、帳單金額、客服聯絡次數等。在訓練過程中,團隊發現部分特徵彼此高度相關,但同時也懷疑有些特徵對流失預測的貢獻有限。若希望模型在避免過擬合(Overfitting)的同時,能自動篩選出較具代表性的特徵,採用下列哪一種方法最為合適?", "options": {"A": "使用早期停止法(Early Stopping)控制訓練回合數,避免過擬合", "B": "同時移除多重共線性特徵並採用 L2 正則化(Ridge),以確保模型穩定收斂", "C": "僅使用 L2 正則化(Ridge),抑制所有權重幅度但保留全部特徵", "D": "採用 L1 正則化(Lasso),透過懲罰項使部分特徵係數縮為 0"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 8, "evidence": "answer column shows 'D' for question 32"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** L1 正則化(Lasso)的稀疏性會把不重要特徵的權重壓為 0,自動完成特徵選擇,同時抑制過擬合 — 完全對應題目「自動篩選有代表性特徵」需求。\n\n**其他選項為何錯:**\n- A. Early Stopping 只控制訓練輪數,不做特徵選擇。\n- B. 手動移除共線性 + L2 雖可,但「自動篩選」上 L1 更直接。\n- C. L2 不會把權重壓到 0,保留全部特徵。\n- D. ✓ 正解\n\n**記憶要點:** 自動特徵選擇 → Lasso (L1);只想穩定縮小權重 → Ridge (L2)。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q33", "topic": "ML/Algorithms", "question_text": "某資料科學團隊正在開發一個客戶相似度比對系統,用於計算所有客戶之間的相似分數。若系統需逐一比對每一位客戶與其他所有客戶的資料組合,此時演算法的時間複雜度最可能為哪一種?其代表意義為何?", "options": {"A": "O(n) — 執行時間與資料量成線性關係", "B": "O(n²) — 執行時間與資料量平方成正比", "C": "O(1) — 執行時間固定不變", "D": "O(log n) — 執行時間與資料數呈對數成長關係"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 8, "evidence": "answer column shows 'B' for question 33"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 兩兩比對 n 個客戶,需要 C(n,2) ≈ n²/2 次計算,屬於 O(n²) 平方時間複雜度。\n\n**其他選項為何錯:**\n- A. O(n) 為線性,僅單次掃描。\n- B. ✓ 正解\n- C. O(1) 為常數時間,不隨資料量變化。\n- D. O(log n) 是二分搜尋或平衡樹查詢。\n\n**記憶要點:** All-pairs 比較 → O(n²);可用近似(LSH、聚類索引)降到接近 O(n log n)。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q34", "topic": "Training/Validation", "question_text": "某醫療人工智慧團隊正在開發心臟病風險預測模型,資料量僅有 150 筆,其中陽性個案不到 8%。由於樣本稀少且類別分布極不平衡,團隊希望在有限資料下,仍能準確評估模型在不同資料上的表現穩定性,同時避免訓練資料被過度切分而影響模型效能。若團隊希望在有限樣本下,同時兼顧資料的利用率與各類別在驗證折中的比例一致性,最適合採用下列哪一種交叉驗證方法?", "options": {"A": "5-Fold 交叉驗證(5-Fold Cross Validation)", "B": "留一法交叉驗證(Leave-One-Out Cross Validation)", "C": "隨機交叉驗證(Random Cross Validation)", "D": "分層留一法交叉驗證(Stratified Leave-One-Out Cross Validation)"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 8, "evidence": "answer column shows 'D' for question 34"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 樣本極少(150 筆) + 嚴重不平衡(< 8% 陽性),需要 (1) 最大化資料利用率 → LOOCV(訓練用 N−1)、(2) 維持類別比例 → Stratified;兩者結合即 Stratified LOOCV,最符合需求。\n\n**其他選項為何錯:**\n- A. 5-fold 資料利用率較低,小樣本下每折更不穩。\n- B. 一般 LOOCV 不保證類別比例。\n- C. 「隨機」會把少數陽性樣本亂分佈。\n- D. ✓ 正解\n\n**記憶要點:** 小樣本 + 不平衡 → Stratified LOOCV。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q35", "topic": "Feature/Engineering", "question_text": "某公司針對製程感測器資料進行主成分分析(PCA),經標準化與協方差矩陣分解後,得到三個主成分的特徵值如下:λ₁=6.0,λ₂=3.0,λ₃=1.0。若團隊決定僅保留能解釋至少 80% 總變量的主成分,以進行後續模型建構,下列哪一項敘述最合理且數據解讀正確?", "options": {"A": "前兩個主成分合計解釋 90% 的總變量,因此可安全降維至二維,且仍保留大部分資訊", "B": "第一主成分解釋 60% 的變量,表示資料結構呈現明顯線性關係,僅保留一維即可避免過擬合", "C": "雖然前兩個主成分可解釋超過 80% 變量,但第二主成分仍貢獻高達 30%,不宜捨棄第三主成分", "D": "三個特徵值相差不大,顯示各主成分變異均勻,降維可能導致資料損失"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 9, "evidence": "answer column shows 'A' for question 35"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** 總變量 = 6+3+1 = 10;前兩個主成分 = (6+3)/10 = 90%,超過 80% 門檻,降至 2 維是合理選擇。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. 第一主成分解釋 6/10 = 60%,但「線性結構」推論過頭;且只保一維會犧牲 40% 變異。\n- C. 第二主成分貢獻 30%,但前兩個合計 90%,捨第三是合理的(只損失 10%)。\n- D. λ₁=6 與 λ₃=1 差六倍,並非均勻。\n\n**記憶要點:** PCA 累積解釋變異 = Σλ_i / Σλ_total;通常取累積 ≥ 80%~95%。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q36", "topic": "Privacy/Compliance", "question_text": "某銀行計畫與多家合作機構共同訓練一個 AI 信用風險預測模型,為避免客戶交易資料在傳輸與運算過程中外洩,技術團隊評估使用同態加密(Homomorphic Encryption)技術。下列何者最能正確描述同態加密在此應用中的關鍵特性?", "options": {"A": "系統以隨機雜訊(Noise)干擾輸出,確保統計結果不洩漏個資", "B": "各參與銀行透過安全通道交換私鑰,確保模型參數一致", "C": "將原始資料壓縮並同時加密,以減少加密後資料量與運算時間", "D": "資料在加密狀態下仍可進行數值運算,模型訓練可於未解密資料上完成"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 9, "evidence": "answer column shows 'D' for question 36"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 同態加密的核心特性就是「密文上可運算 + 解密後等同明文運算結果」,讓多方協作時不需互相分享明文資料即可訓練模型。\n\n**其他選項為何錯:**\n- A. 加噪聲是差分隱私(Differential Privacy)。\n- B. 私鑰交換並非同態加密本身的特性。\n- C. 同態加密通常會「擴大」資料量與運算時間,不是壓縮。\n- D. ✓ 正解\n\n**記憶要點:** Homomorphic Encryption = 密文可算;Differential Privacy = 加雜訊。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q37", "topic": "Privacy/Compliance", "question_text": "某跨銀行風控平台希望整合多家銀行的用戶行為資料,用於訓練信用風險預測模型。由於競爭與法規限制,各銀行僅願意提供加密後資料,且資料在任何時間不得被平台解密。同時,平台需建立安全通訊協議以確保資料在傳輸過程未被竄改或重放。下列哪一組技術最能完整對應上述需求?", "options": {"A": "對稱加密(Symmetric Encryption) + 單向雜湊(Hash Function) + 非對稱加密(Asymmetric Encryption) + 差分隱私(Differential Privacy)", "B": "同態加密(Homomorphic Encryption) + 非對稱加密(Asymmetric Encryption) + 單向雜湊(One-way Hash Function) + 對稱加密(Symmetric Encryption)", "C": "差分隱私(Differential Privacy) + 對稱加密(Symmetric Encryption) + 同態加密(Homomorphic Encryption) + 數位簽章(Digital Signature)", "D": "同態加密(Homomorphic Encryption) + 安全多方計算(Secure Multi-party Computation, MPC) + 雜湊函數(Hash Function) + 對稱加密(Symmetric Encryption)"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 9, "evidence": "answer column shows 'B' for question 37"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 需求拆解:(1) 加密狀態仍能訓練 → 同態加密;(2) 安全金鑰交換 → 非對稱加密(公私鑰);(3) 傳輸完整性(防竄改、重放) → 單向雜湊(訊息摘要);(4) 大量資料加密效率 → 對稱加密。B 完整對應這四項。\n\n**其他選項為何錯:**\n- A. 沒有同態加密,無法在加密狀態下訓練。\n- B. ✓ 正解\n- C. 沒有非對稱加密(金鑰交換)組件較弱。\n- D. MPC 雖能達類似目的但題目強調的是「加密後資料」,且缺非對稱加密。\n\n**記憶要點:** 加密訓練 + 金鑰交換 + 完整性 + 高效加密 = HE + Asymmetric + Hash + Symmetric。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q38", "topic": "Eval/Metrics", "question_text": "[此題包含附圖:Python 程式碼]\n\n```python\ndef metric(y_true, y_pred):\n    return sum((y_true - y_pred) ** 2) / len(y_true)\n```\n\n附圖程式碼所計算的是哪一類型的評估指標?", "options": {"A": "MAE", "B": "MSE", "C": "RMSE", "D": "R²"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 9, "evidence": "answer column shows 'B' for question 38"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 程式碼計算 Σ(y_true − y_pred)² / N,正是均方誤差(Mean Squared Error, MSE)的定義。\n\n**其他選項為何錯:**\n- A. MAE 用絕對值 |y_true − y_pred|,不是平方。\n- B. ✓ 正解\n- C. RMSE 是 MSE 再開根號,程式碼沒有 sqrt。\n- D. R² 公式涉及 SSE 與 SST 的比值,結構完全不同。\n\n**記憶要點:** 平方/N → MSE;再開根 → RMSE;絕對值/N → MAE。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q39", "topic": "DL/Optimization", "question_text": "[此題包含附圖:Python 程式碼]\n\n```python\ndef forward(x, p, training=True):\n    if training:\n        mask = np.random.binomial(1, p, size=x.shape)\n        return x * mask / p\n    else:\n        return x\n```\n\n附圖程式碼實現的是哪一種正則化技術?", "options": {"A": "L1 正則化", "B": "L2 正則化", "C": "Dropout", "D": "Batch Normalization"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 9, "evidence": "answer column shows 'C' for question 39"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** 訓練時隨機產生 0/1 mask(Bernoulli)並乘上輸入,再除以 p(inverted dropout 的縮放補償);測試時直接回傳輸入 — 完全是 Dropout 的標準實作。\n\n**其他選項為何錯:**\n- A. L1 是在 loss 加 |w|,與隨機 mask 無關。\n- B. L2 是在 loss 加 w²,亦無關。\n- C. ✓ 正解\n- D. Batch Norm 是按 batch 標準化激活值,結構完全不同。\n\n**記憶要點:** 隨機關閉神經元 + 訓練/推論不同行為 = Dropout(inverted dropout 除以 p)。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q40", "topic": "Math/LinAlg", "question_text": "依據附圖程式碼進行資料處理,下列何者正確?\n\n```python\nimport numpy as np\nv1 = np.array([1, 2, 3])\nv2 = np.array([4, 5, 6])\nA = np.array([[1, 2], [3, 4]])\n```", "options": {"A": "np.linalg.inv(A) 計算矩陣 A 的行列式", "B": "v1 * v2 結果為 array([5, 7, 9])", "C": "np.dot(v1, v2) 結果為 np.int64(32)", "D": "np.linalg.eig(A) 計算矩陣 A 的反矩陣"}, "correct_answer": "C", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 10, "evidence": "answer column shows 'C' for question 40"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 C 是正解:** np.dot(v1, v2) 計算向量內積 = 1·4 + 2·5 + 3·6 = 4+10+18 = 32,回傳值為 np.int64(32)。\n\n**其他選項為何錯:**\n- A. `np.linalg.inv(A)` 計算「反矩陣」,行列式是 `np.linalg.det(A)`。\n- B. `v1 * v2` 是 element-wise 乘法 = [4, 10, 18],不是 [5, 7, 9](那是加法)。\n- C. ✓ 正解\n- D. `np.linalg.eig(A)` 計算特徵值與特徵向量,不是反矩陣。\n\n**記憶要點:** NumPy:inv → 反矩陣;det → 行列式;eig → 特徵值;dot → 內積。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q41", "topic": "Math/Probability", "question_text": "[此題包含附圖:擲骰子 Monte Carlo 程式碼]\n\n```python\nimport numpy as np\nnp.random.seed(123)\nn = 100000\ndice_rolls = np.random.randint(1, 7, size=n)\nA = (dice_rolls % 2 == 0)\nB = (dice_rolls > 3)\nA_and_B = A & B\n```\n\n事件 A:擲出偶數;事件 B:擲出大於 3。請問下列何者為條件機率 P(A|B) 的正確值?", "options": {"A": "A_and_B.sum() / (A.sum() * B.sum())", "B": "A_and_B.sum() / (A.sum() + B.sum())", "C": "A_and_B.sum() / A.sum()", "D": "A_and_B.sum() / B.sum()"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 10, "evidence": "answer column shows 'D' for question 41"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** 條件機率定義 P(A|B) = P(A ∩ B) / P(B);Monte Carlo 估計分子 ≈ A_and_B.sum()/n、分母 ≈ B.sum()/n,n 消去後 = A_and_B.sum() / B.sum()。\n\n**其他選項為何錯:**\n- A. 此式為 P(A ∩ B) / (n · P(A)·P(B)),為獨立情況下的偏離指標,非條件機率。\n- B. 分母改為和,公式錯誤。\n- C. C 是 P(B|A),不是 P(A|B)。\n- D. ✓ 正解\n\n**記憶要點:** P(A|B) = P(A∩B)/P(B),條件以「B」為分母。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q42", "topic": "DL/CNN", "question_text": "[此題包含 VGG16 模型結構附圖]\n\n在深度神經網路中,不同層的參數量(parameter count)差異極大。有些層雖然數量少但計算量大,有些則相反。了解參數分佈情形,有助於模型壓縮與遷移學習設計。請問在 VGG16 中,下列何者的參數量最多?", "options": {"A": "卷積層(Conv2d)", "B": "全連接層(Linear)", "C": "ReLU 激活函數", "D": "池化層(MaxPool2d, AdaptiveAvgPool2d)"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 11, "evidence": "answer column shows 'B' for question 42"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** VGG16 全連接層(尤其第一層 Linear-33 約 1.027 億參數)主導整體 138.36M 參數;卷積層因參數共享反而相對少。\n\n**其他選項為何錯:**\n- A. 卷積層參數量遠小於 FC(基於卷積核大小與通道,而非展平後的維度)。\n- B. ✓ 正解\n- C. ReLU 沒有可學習參數。\n- D. 池化層沒有可學習參數。\n\n**記憶要點:** VGG 系列參數爆炸點 = 第一個 FC(展平後 × 4096);現代設計改用 Global Avg Pool 避開。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q43", "topic": "DL/CNN", "question_text": "在神經網路中,了解各層的運算量分佈,有助於模型壓縮與硬體加速的策略設計。請問在 VGG16 中,下列何者運算量(FLOPs)最多?", "options": {"A": "卷積層(Conv2d)", "B": "全連接層(Linear)", "C": "ReLU 激活函數", "D": "池化層(MaxPool2d, AdaptiveAvgPool2d)"}, "correct_answer": "A", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 11, "evidence": "answer column shows 'A' for question 43"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 A 是正解:** VGG 中卷積層雖然參數量少,但每個卷積核要在大張特徵圖上滑動運算,FLOPs 遠遠超過 FC 層(FC 是矩陣乘法但輸入維度小)。\n\n**其他選項為何錯:**\n- A. ✓ 正解\n- B. FC 雖參數多,但只算一次矩陣乘,FLOPs 不及大張特徵圖上的卷積。\n- C. ReLU 是 element-wise 比較,FLOPs 很少。\n- D. Pooling 也是 element-wise 操作,FLOPs 少。\n\n**記憶要點:** CNN 參數量多 ≠ FLOPs 多;卷積層 FLOPs 大、FC 層參數量大,是典型分佈。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q44", "topic": "DL/CNN", "question_text": "[此題基於 VGG16 模型表]\n\nVGG16 層數深且結構規則,由多層卷積、池化及全連接層組成。了解各層的輸入/輸出維度、參數量及記憶體需求,有助於掌握 CNN 模型的組成邏輯與實作技巧。根據 VGG16 的模型架構,下列敘述何者正確?", "options": {"A": "AdaptiveAvgPool2d 的輸出會被攤平後傳入第一個全連接層;由於前一層池化輸出空間為 4×4,所以第一個線性層的輸入維度是 512×4×4 = 8192", "B": "Linear-33(第一個全連接層)報出的 102,764,544 參數只包含權重,偏差(bias)沒有算在內", "C": "根據列出的「Estimated Total Size (MB) = 624.98」,表示訓練此模型只需大約 625MB 的 GPU 記憶體(包含所有 optimizer state 與梯度),所以一張 1 GB 的 GPU 就足夠訓練", "D": "VGG16 包含 13 層卷積(conv)與 3 層全連接層(FC),總參數數目約為 138,357,544(約 138.36M)"}, "correct_answer": "D", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 11, "evidence": "answer column shows 'D' for question 44"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 D 是正解:** VGG16 標準架構就是 13 conv + 3 FC = 16 個權重層,總參數 ≈ 138.36M,與表底「Total params: 138,357,544」一致。\n\n**其他選項為何錯:**\n- A. 由表中 AdaptiveAvgPool2d 輸出為 [512, 7, 7],所以 FC 輸入 = 512·7·7 = 25088,而非 8192。\n- B. Linear 的參數計算 (in_features+1) × out_features,通常包含 bias;102,764,544 = 25088·4096 + 4096 已含偏差。\n- C. Estimated Total Size 只是前向/反向的記憶體估算,不含 optimizer state 與梯度;實際訓練需要更多。\n- D. ✓ 正解\n\n**記憶要點:** VGG16 = 16 個有權重層(13 conv + 3 FC),params ≈ 138M。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q45", "topic": "DL/CNN", "question_text": "[此題包含 4 段 PyTorch 程式碼附圖] 在實務應用中,我們常使用遷移學習(transfer learning)技巧,即載入預訓練模型(如 VGG16),凍結部分層的參數,只針對特定任務重新訓練最後幾層,這種做法可節省訓練時間並提升模型效能。假設你要對 VGG16 進行遷移學習(transfer learning),希望凍結卷積層的參數,只訓練最後全連接層(classifier)。下列哪段程式碼寫法正確?", "options": {"A": "對 model.parameters() 全部凍結後,再重新指定 classifier[6]", "B": "對 model.features.parameters() 凍結後,重新指定 classifier[6] = nn.Linear(4096, 10)", "C": "對 model.classifier.parameters() 凍結後,重新指定 classifier[6]", "D": "對 model.requires_grad = False 後,重新指定 classifier[6]"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 13, "evidence": "answer column shows 'B' for question 45"}, "verified": true, "verification_needed": null, "explanation": "**為什麼 B 是正解:** 凍結「卷積層」應只針對 `model.features.parameters()`(VGG 將卷積堆放在 `features` 子模組);classifier 保留可訓練,再覆寫 classifier[6] 為新任務的輸出層。\n\n**其他選項為何錯:**\n- A. 全部凍結後 classifier[6] 雖被替換成可訓練的新層,但仍可訓練;不過題目強調是「凍結卷積、訓練 classifier 全部」,A 雖部分對但不夠準確。\n- B. ✓ 正解\n- C. 反了:凍結了 classifier,反而訓練 features,不符合題意。\n- D. `model.requires_grad = False` 語法錯誤(此屬性是 tensor 級別,不是 model 級別)。\n\n**記憶要點:** Transfer Learning 標準步驟:凍結 features → 換 classifier 最後一層 → 訓練 classifier。", "subject_code": "s3"}, {"id": "exam-s3-114-2-q46", "topic": "Feature/Engineering", "question_text": "[此題包含 noisy 手寫數字 PCA 程式碼附圖]\n\n```\nfrom sklearn.decomposition import PCA  #程式碼A\npca = PCA()                            #程式碼B\npca.fit(noisy)                         #程式碼C\ncomponents = pca.transform(noisy)      #程式碼D\nfiltered = pca.inverse_transform(components)\n```\n\n假設研究人員已將含有雜訊的手寫數字影像存放在變數 noisy 中。他們嘗試使用 PCA 進行降噪,並希望能保留影像的主要特徵,同時去除影像中的雜訊。然而,當程式執行後,觀察到影像仍然含有明顯的雜訊。研究人員懷疑是程式中某個步驟的設定不正確,導致 PCA 沒有發揮降噪的作用,需要修改程式碼才能讓 PCA 對 noisy 影像有效去噪。請問哪一段程式碼需要修改,才能讓 PCA 對 noisy 影像有效去噪?", "options": {"A": "程式碼 A", "B": "程式碼 B", "C": "程式碼 C", "D": "程式碼 D"}, "correct_answer": "B", "source": {"file": "subjects/3-ml/past-exam.pdf", "page": 15, "evidence": "
